<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify link</title>
    <script>
      let targetURL;
      function redirectToLink() {
        if (targetURL) {
          window.open(targetURL, "_blank");
        } else {
          document.getElementById("message").textContent =
            "URL not found, please try it again !";
        }
      }

      window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get("r");
        if (roomId) {
          targetURL = `https://www.tiktok.com/share/live/${roomId}`;
          redirectToLink();
        } else {
          document.getElementById("message").textContent = "URL not found !";
        }
      };
    </script>
  </head>
  <body>
    <p id="message">Redirecting to live stream</p>
    <button onclick="redirectToLink()">Join this live now !</button>
  </body>
</html>
