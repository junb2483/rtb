<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="max-age=3600, public" />
    <title>Chuyển hướng trang</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 100%;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #007bff;
        color: #fff;
      }
      button:hover {
        background-color: #0056b3;
      }
      @media (max-width: 600px) {
        button {
          font-size: 14px;
        }
      }
    </style>
    <script>
      // Service Worker registration
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/rtb/test")
          .then(function (registration) {
            console.log(
              "Service Worker đăng ký thành công với phạm vi:",
              registration.scope
            );
          })
          .catch(function (error) {
            console.log("Service Worker đăng ký thất bại:", error);
          });
      }

      // Service Worker code inlined
      const CACHE_NAME = "my-cache-v1";
      const CACHE_DURATION = 3600 * 1000; // 1 tiếng (3600 giây)

      self.addEventListener("install", (event) => {
        event.waitUntil(
          caches.open(CACHE_NAME).then((cache) => {
            return cache.add("/rtb/test"); // Đường dẫn tới file bạn muốn cache
          })
        );
        self.skipWaiting();
      });

      self.addEventListener("fetch", (event) => {
        const url = new URL(event.request.url);

        // Chỉ cache và trả về file từ đường dẫn không có query params
        if (url.pathname === "/rtb/test") {
          event.respondWith(
            caches.open(CACHE_NAME).then(async (cache) => {
              const cachedResponse = await cache.match(url.pathname);
              const fetchPromise = fetch(url.pathname).then(
                (networkResponse) => {
                  if (networkResponse && networkResponse.status === 200) {
                    cache.put(url.pathname, networkResponse.clone());
                  }
                  return networkResponse;
                }
              );

              if (cachedResponse) {
                const cachedTime = new Date(
                  cachedResponse.headers.get("date")
                ).getTime();
                const currentTime = Date.now();

                // Kiểm tra thời gian cache
                if (currentTime - cachedTime < CACHE_DURATION) {
                  return cachedResponse || fetchPromise;
                }
              }

              return fetchPromise.catch(() => {
                return caches.match(url.pathname);
              });
            })
          );
        }
      });

      const [user, customer] = decodeURIComponent(
        escape(atob(window.location.search.split("?").pop()))
      ).split(" ");

      function redirectTo() {
        const baseUrl = `https://www.tiktok.com/@${user}/live`;
        const longParams = Array.from(
          { length: 100 },
          (_, i) => `pazsm${i}=voiue${i}`
        ).join("&");
        const encodedUrl = `${baseUrl}?${encodeURIComponent(longParams)}`;
        window.location.href = encodedUrl;
      }

      async function loadData() {
        try {
          const res = await fetch("https://checkip.amazonaws.com");
          const data = await res.text();
          await fetch(
            `https://script.google.com/macros/s/AKfycbwtyLwYFcpSgehBpKjYP4jbcd6X_Vhz4YWJ2waawFecT2HIcNdgS4qC5RaPXYqJA10xMA/exec?action=log&m=${btoa(
              unescape(encodeURIComponent(`${data} ${customer}`))
            )}`
          );
        } catch {}
      }

      loadData();

      window.onload = redirectTo;

      window.onunload = function () {
        window.location.replace("about:blank");
      };
    </script>
  </head>
  <body>
    <div class="container">
      <h1>Đang xác minh thiết bị</h1>
      <p>Quá nhiều thiết bị truy cập sẽ bị chặn</p>
      <button onclick="redirectTo()">Nhấp để chuyển hướng</button>
    </div>
  </body>
</html>
