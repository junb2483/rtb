<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple HTML with iFrame</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe
      id="tiktok-iframe"
      src="https://www.tiktok.com/@fr.diy.1328/live"
      width="100%"
      height="100%"
      frameborder="0"
      sandbox="allow-same-origin allow-scripts allow-popups"
      allowfullscreen
    ></iframe>

    <script>
      document
        .getElementById("tiktok-iframe")
        .addEventListener("load", function () {
          var iframeWindow =
            document.getElementById("tiktok-iframe").contentWindow;
          iframeWindow.postMessage("openInApp", "*");
        });

      window.addEventListener("message", function (event) {
        if (event.data === "openInApp") {
          window.open("https://www.tiktok.com/@fr.diy.1328/live", "_blank");
        }
      });
    </script>
  </body>
</html>
