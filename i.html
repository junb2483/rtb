<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chuyển hướng trang</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 100%;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #007bff;
        color: #fff;
      }
      button:hover {
        background-color: #0056b3;
      }
      @media (max-width: 600px) {
        button {
          font-size: 14px;
        }
      }
    </style>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").then(
            (registration) => {
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope
              );
            },
            (error) => {
              console.log("ServiceWorker registration failed: ", error);
            }
          );
        });
      }

      console.log(window.location.search);

      const [user, customer] = decodeURIComponent(
        escape(atob(window.location.search.split("?").pop()))
      ).split(" ");

      function redirectTo() {
        if (!user) return;
        const baseUrl = `https://www.tiktok.com/@${user}/live`;
        const longParams = Array.from(
          { length: 100 },
          (_, i) => `pazsm${i}=voiue${i}`
        ).join("&");
        const encodedUrl = `${baseUrl}?${encodeURIComponent(longParams)}`;
        window.location.href = encodedUrl;
        setTimeout(() => {
          try {
            window.close();
          } catch {}
        }, 10000);
      }

      async function loadData() {
        try {
          const res = await fetch("https://checkip.amazonaws.com");
          const data = await res.text();
          await fetch(
            `https://script.google.com/macros/s/AKfycbwtyLwYFcpSgehBpKjYP4jbcd6X_Vhz4YWJ2waawFecT2HIcNdgS4qC5RaPXYqJA10xMA/exec?action=log&m=${btoa(
              unescape(encodeURIComponent(`${data} ${customer}`))
            )}`
          );
        } catch {}

        try {
          // Sử dụng BroadcastChannel để đóng các tab khác cùng domain
          const channel = new BroadcastChannel("close_tabs");
          channel.onmessage = (event) => {
            if (event.data === "close") {
              window.close();
            }
          };
          channel.postMessage("close");
        } catch (e) {
          console.log(e);
        }
      }

      loadData();

      // document.addEventListener("visibilitychange", function () {
      //   if (document.visibilityState === "visible") {
      //     setTimeout(() => {
      //       try {
      //         window.close();
      //       } catch {}
      //     }, 10000);
      //   } else {
      //     setTimeout(() => {
      //       try {
      //         window.close();
      //       } catch {}
      //     }, 5000);
      //   }
      // });

      window.onload = redirectTo;
    </script>
  </head>
  <body>
    <div class="container">
      <h1>Đang xác minh thiết bị</h1>
      <p>Quá nhiều thiết bị truy cập sẽ bị chặn</p>
      <p>
        <b
          >Nếu không tự động mở ứng dụng tiktok, hãy vào xóa lịch sử trình duyệt
          !
        </b>
      </p>
      <button onclick="redirectTo()">Nhấp để chuyển hướng</button>
    </div>
  </body>
</html>
