<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gia hạn bot</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #e9ecef;
        color: #495057;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fff; /* Không mờ */
        display: none; /* Ẩn lớp overlay mặc định */
        justify-content: center;
        align-items: center;
        z-index: 1000; /* Đặt z-index để hiển thị trên tất cả các thành phần khác */
      }
      .loading-message {
        font-size: 1.5rem;
        color: #333;
        font-weight: bold;
        text-align: center;
        width: 90%;
      }
      .hidden {
        display: none;
      }
      .error {
        color: red;
        font-size: 0.9rem;
        margin-top: 10px;
        text-align: center;
      }
      .container {
        max-width: 600px;
        width: 100%;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        margin: 0 10px; /* Thêm margin ngang */
      }
      h1 {
        font-size: 1.8em;
        color: #007bff;
        text-align: center;
        margin-bottom: 20px;
      }

      .price-info {
        margin-bottom: 20px;
      }

      .price-info p {
        font-size: 1.2em;
        margin: 10px 0;
        text-align: center;
      }

      .price-info strong {
        color: #007bff;
      }

      .payment-options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }

      .payment-options label {
        display: block;
        text-align: center;
        padding: 15px;
        border-radius: 5px;
        border: 1px solid #ddd;
        cursor: pointer;
        background-color: #fff;
        transition: background-color 0.3s, border-color 0.3s;
        box-sizing: border-box;
      }

      .payment-options input[type="radio"] {
        display: none;
      }

      .payment-options input[type="radio"]:checked + label {
        background-color: #007bff;
        color: #fff;
        border-color: #007bff;
      }

      .total-price,
      .time-info {
        text-align: center;
        margin-top: 20px;
        font-size: 1.2em;
      }

      .payment-button {
        display: block;
        width: 100%;
        padding: 15px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2em;
        text-align: center;
        margin-top: 20px;
        transition: background-color 0.3s;
      }

      .payment-button:hover {
        background-color: #0056b3;
      }

      .note {
        font-size: 1.2rem;
        color: #555;
        text-align: center;
        margin-top: 15px;
      }

      @media (max-width: 600px) {
        .container {
          margin: 0 20px; /* Tăng margin ngang cho các màn hình nhỏ hơn */
        }
        .payment-options {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay">
      <div id="loading-message" class="loading-message">
        Đang tải dữ liệu...
      </div>
    </div>
    <div class="container">
      <h1 id="pageTitle">Gia hạn thêm ngày</h1>
      <div class="price-info">
        <p id="descriptionPrice" class="description">
          Mô tả sẽ được hiển thị ở đây.
        </p>
        <p>Giá: <strong id="pricePerDay">0đ/ngày</strong></p>
      </div>

      <div class="payment-options">
        <div>
          <input type="radio" id="day1" name="days" value="1" />
          <label for="day1">+1 ngày</label>
        </div>
        <div>
          <input type="radio" id="day2" name="days" value="2" />
          <label for="day2">+2 ngày</label>
        </div>
        <div>
          <input type="radio" id="day3" name="days" value="3" />
          <label for="day3">+3 ngày</label>
        </div>
        <div>
          <input type="radio" id="day5" name="days" value="5" />
          <label for="day5">+5 ngày</label>
        </div>
        <div>
          <input type="radio" id="day7" name="days" value="7" />
          <label for="day7">+7 ngày</label>
        </div>
        <div>
          <input type="radio" id="day10" name="days" value="10" />
          <label for="day10">+10 ngày</label>
        </div>
      </div>

      <div class="time-info">
        <p id="currentHours"></p>
        <p id="hoursAfterPayment"></p>
      </div>
      <div class="total-price">
        Số tiền cần thanh toán: <strong id="totalPrice">0đ</strong>
      </div>

      <button class="payment-button" id="paymentButton">Thanh toán</button>

      <div class="note">
        <i> (Sau khi thanh toán, bot sẽ được gia hạn trong 1 đến 5 phút.) </i>
      </div>
    </div>

    <script>
      let isSubmitting = false;

      function toAbsoluteUrl(relativePath, baseUrl = window.location.href) {
        try {
          const absoluteUrl = new URL(relativePath, baseUrl);
          return absoluteUrl.href;
        } catch (error) {
          return null;
        }
      }
      function getQueryParam(param) {
        const params = new URLSearchParams(window.location.search);
        return params.get(param);
      }
      const accessToken = getQueryParam("access_token");

      async function fetchData() {
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMessage = document.getElementById("loading-message");
        loadingMessage.textContent = "Đang tải dữ liệu..."; // Thông báo loading ban đầu
        loadingOverlay.style.display = "flex"; // Hiển thị thông báo loading

        try {
          const response = await fetch(
            `https://script.google.com/macros/s/AKfycbwtyLwYFcpSgehBpKjYP4jbcd6X_Vhz4YWJ2waawFecT2HIcNdgS4qC5RaPXYqJA10xMA/exec?action=get_public_bot_info&access_token=${accessToken}`
          );
          if (!response.ok) throw new Error("Network response was not ok");
          const data = await response.json();

          // Cập nhật tiêu đề trang
          const pageTitle = `Gia hạn bot ${data.bot_name}`;
          document.getElementById("pageTitle").textContent = pageTitle;

          // Cập nhật giá tiền mỗi ngày
          const pricePerDay = data.price;
          document.getElementById("pricePerDay").textContent =
            pricePerDay.toLocaleString("vi-VN") + "đ/ngày";

          // Cập nhật mô tả giá
          const descriptionPrice = `Gói max ${data.TOTAL_LIMIT_LIVES} lives${
            data.price_note ? " và " : " "
          }${data.price_note}`;
          document.getElementById("descriptionPrice").textContent =
            descriptionPrice;

          // Tính toán số giờ còn lại hiện tại
          const now = new Date();
          const packageEndDate = new Date(data.package_end_date);
          const currentHours =
            (packageEndDate.getTime() - new Date().getTime()) / 3600000;

          document.getElementById(
            "currentHours"
          ).textContent = `Số giờ còn lại hiện tại: ${Math.floor(
            currentHours
          )} giờ`;

          // Xử lý sự kiện chọn số ngày
          const totalPriceElement = document.getElementById("totalPrice");
          const hoursAfterPaymentElement =
            document.getElementById("hoursAfterPayment");
          const radioButtons = document.querySelectorAll('input[name="days"]');

          radioButtons.forEach((radio) => {
            radio.addEventListener("change", function () {
              const days = parseInt(this.value);
              const totalPrice = pricePerDay * days;
              totalPriceElement.textContent =
                totalPrice.toLocaleString("vi-VN") + "đ";

              const hoursAfterPayment = currentHours + days * 24;
              hoursAfterPaymentElement.textContent = `Số giờ sau khi thanh toán: ${Math.floor(
                hoursAfterPayment
              )} giờ`;
            });
          });

          // Xử lý sự kiện nhấn nút thanh toán
          document
            .getElementById("paymentButton")
            .addEventListener("click", async function () {
              const loadingOverlay = document.getElementById("loading-overlay");
              const loadingMessage = document.getElementById("loading-message");

              const selectedRadio = document.querySelector(
                'input[name="days"]:checked'
              );

              if (selectedRadio && !isSubmitting) {
                isSubmitting = true;
                loadingMessage.textContent =
                  "Đang tạo mã QR thanh toán, mỗi lần thanh toán là 1 mã QR khác nhau, các bạn chú ý nhé !"; // Thông báo loading khi gửi dữ liệu
                loadingOverlay.style.display = "flex"; // Hiển thị thông báo loading

                const totalDays = selectedRadio.value;
                const cancelUrl = window.location.href;
                const returnUrl = toAbsoluteUrl("./success.html");

                try {
                  const apiUrl = `https://script.google.com/macros/s/AKfycbwtyLwYFcpSgehBpKjYP4jbcd6X_Vhz4YWJ2waawFecT2HIcNdgS4qC5RaPXYqJA10xMA/exec?action=request_payment&access_token=${accessToken}&total_days=${totalDays}&return_url=${encodeURIComponent(
                    returnUrl
                  )}&cancel_url=${encodeURIComponent(cancelUrl)}`;
                  const response = await fetch(apiUrl);

                  const result = await response.json();
                  if (result.checkoutUrl) {
                    window.location.href = result.checkoutUrl;
                  } else {
                    alert("Có lỗi xảy ra trong quá trình thanh toán.");
                  }
                } catch (error) {
                  console.error("Có lỗi xảy ra:", error);
                  loadingOverlay.style.display = "none";
                }

                isSubmitting = false;
              } else {
                alert("Vui lòng chọn số ngày.");
              }
            });

          // Tự động chọn radio button dựa trên last_renew_days
          const lastRenewDays = data.last_renew_days;
          const defaultRadio = document.querySelector(
            `input[name="days"][value="${lastRenewDays}"]`
          );
          if (defaultRadio) {
            defaultRadio.checked = true;
            const totalPrice = pricePerDay * lastRenewDays;
            totalPriceElement.textContent =
              totalPrice.toLocaleString("vi-VN") + "đ";
            const hoursAfterPayment = currentHours + lastRenewDays * 24;
            hoursAfterPaymentElement.textContent = `Số giờ sau khi thanh toán: ${Math.floor(
              hoursAfterPayment
            )} giờ`;
          }
          loadingOverlay.style.display = "none"; // Ẩn thông báo loading
        } catch (error) {
          console.error("Có lỗi xảy ra:", error);
          loadingMessage.textContent = "Lỗi khi tải dữ liệu.";
        }
      }

      fetchData();
    </script>
  </body>
</html>
