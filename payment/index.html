<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gia hạn bot</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #e9ecef;
        color: #495057;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fff; /* Không mờ */
        display: none; /* Ẩn lớp overlay mặc định */
        justify-content: center;
        align-items: center;
        z-index: 1000; /* Đặt z-index để hiển thị trên tất cả các thành phần khác */
      }
      .loading-message {
        font-size: 1.5rem;
        color: #333;
        font-weight: bold;
        text-align: center;
        width: 90%;
      }
      .hidden {
        display: none;
      }
      .error {
        color: red;
        font-size: 0.9rem;
        margin-top: 10px;
        text-align: center;
      }
      .container {
        max-width: 600px;
        width: 100%;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        margin: 0 10px; /* Thêm margin ngang */
      }
      h1 {
        font-size: 1.8em;
        color: #007bff;
        text-align: center;
        margin-bottom: 20px;
      }

      .price-info {
        margin-bottom: 20px;
      }

      .price-info p {
        font-size: 1.2em;
        margin: 10px 0;
        text-align: center;
      }

      .price-info strong {
        color: #007bff;
      }

      .payment-options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }

      .payment-options label {
        display: block;
        text-align: center;
        padding: 15px;
        border-radius: 5px;
        border: 1px solid #ddd;
        cursor: pointer;
        background-color: #fff;
        transition: background-color 0.3s, border-color 0.3s;
        box-sizing: border-box;
      }

      .payment-options input[type="radio"] {
        display: none;
      }

      .payment-options input[type="radio"]:checked + label {
        background-color: #007bff;
        color: #fff;
        border-color: #007bff;
      }

      .total-price,
      .time-info {
        text-align: center;
        margin-top: 20px;
        font-size: 1.2em;
      }

      .open-button {
        margin-right: 15px;
        display: block;
        padding: 15px;
        background-color: orange;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2em;
        text-align: center;
        transition: background-color 0.3s;
      }

      .backup-button {
        margin-right: 15px;
        display: block;
        padding: 15px;
        background-color: orange;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2em;
        text-align: center;
        transition: background-color 0.3s;
      }

      .backup-button:hover {
        background-color: #e6954e;
      }

      .payment-button {
        flex-grow: 1;
        display: block;
        padding: 15px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2em;
        text-align: center;
        transition: background-color 0.3s;
      }

      .payment-button:hover {
        background-color: #0056b3;
      }

      .note {
        font-size: 1.2rem;
        color: #555;
        text-align: center;
        margin-top: 15px;
        margin-bottom: 15px;
      }
      .promote-percent {
        position: absolute;
        background-color: red;
        top: -5px;
        right: 0;
        padding: 2px;
        padding-left: 5px;
        padding-right: 5px;
        border-radius: 5px;
        color: white;
      }
      .note i {
        display: block;
      }

      @media (max-width: 600px) {
        .container {
          margin: 0 20px; /* Tăng margin ngang cho các màn hình nhỏ hơn */
        }
        .payment-options {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      .password-modal {
        display: none;
        position: fixed;
        z-index: 1001; /* Đặt z-index để hiển thị trên tất cả các thành phần khác */
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .password-modal.show {
        opacity: 1;
        visibility: visible;
      }

      .password-modal-content {
        background: white;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: left;
        animation: fadeIn 0.3s ease;
        box-sizing: border-box;
        padding: 20px;
      }

      .password-modal-content label {
        font-weight: bold;
        display: block;
      }
      .password-modal-content input {
        font-size: 1.2rem;
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        margin-top: 5px;
      }

      .password-modal-buttons {
        display: flex;
        margin-top: 12px;
      }
      .password-modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      .btn-password-submit {
        background: #28a745;
        color: white;
      }
      .btn-password-submit:hover {
        background: #218838;
      }
    </style>
  </head>
  <body>
    <div id="password-modal" class="password-modal">
      <div class="password-modal-content">
        <label>Nhập mật khẩu: </label>
        <input type="password" id="password" placeholder="Mật khẩu" />
        <div class="password-modal-buttons">
          <button id="btn-password-submit" class="btn-password-submit">
            Xác nhận
          </button>
        </div>
      </div>
    </div>
    <div id="loading-overlay" class="loading-overlay">
      <div id="loading-message" class="loading-message">
        Đang tải dữ liệu...
      </div>
    </div>
    <div id="container" class="container">
      <h1 id="pageTitle">Gia hạn thêm ngày</h1>
      <div class="price-info">
        <p id="descriptionPrice" class="description"></p>
        <p id="descriptionBxh" class="bxhNote"></p>
        <p>
          Giá:
          <strong id="newPrice">0đ/ngày</strong>
          <strong
            id="oldPrice"
            style="
              font-family: 'Times New Roman', Times, serif;
              color: gray;
              padding-right: 5px;
              padding-left: 5px;
              text-decoration: line-through;
              -webkit-text-decoration-line: line-through;
            "
          ></strong>
        </p>
        <p id="max_devices" style="color: #007bff"></p>
      </div>

      <div class="payment-options">
        <div id="div_1_days" style="position: relative">
          <input type="radio" id="day1" name="days" value="1" />
          <label for="day1"
            >+1 ngày
            <div id="km1day" class="promote-percent">- 1%</div></label
          >
        </div>
        <div id="div_2_days" style="position: relative">
          <input type="radio" id="day2" name="days" value="2" />
          <label for="day2"
            >+2 ngày
            <div id="km2day" class="promote-percent">- 1%</div></label
          >
        </div>
        <div id="div_3_days" style="position: relative">
          <input type="radio" id="day3" name="days" value="3" />
          <label for="day3"
            >+3 ngày
            <div id="km3day" class="promote-percent">- 1%</div></label
          >
        </div>
        <div style="position: relative">
          <input type="radio" id="day5" name="days" value="5" />
          <label for="day5"
            >+5 ngày
            <div id="km5day" class="promote-percent">- 1%</div></label
          >
        </div>
        <div style="position: relative">
          <input type="radio" id="day7" name="days" value="7" />
          <label for="day7"
            >+7 ngày
            <div id="km7day" class="promote-percent">- 1%</div></label
          >
        </div>
        <div style="position: relative">
          <input type="radio" id="day10" name="days" value="10" />
          <label for="day10"
            >+10 ngày
            <div id="km10day" class="promote-percent">- 1%</div></label
          >
        </div>

        <div id="div_15_days" style="position: relative">
          <input type="radio" id="day15" name="days" value="15" />
          <label for="day15"
            >+15 ngày
            <div id="km15day" class="promote-percent">- 1%</div></label
          >
        </div>

        <div id="div_30_days" style="position: relative">
          <input type="radio" id="day30" name="days" value="30" />
          <label for="day30"
            >+30 ngày
            <div id="km30day" class="promote-percent">- 1%</div></label
          >
        </div>
      </div>

      <div class="time-info">
        <p id="newHours"></p>
      </div>
      <div class="total-price">
        Tổng:
        <strong id="newTotal">0đ</strong>
        <strong
          id="oldTotal"
          style="
            font-family: 'Times New Roman', Times, serif;
            color: gray;
            padding-right: 5px;
            padding-left: 5px;
            text-decoration: line-through;
            -webkit-text-decoration-line: line-through;
          "
        ></strong>
      </div>

      <div style="margin-top: 20px; display: flex; width: 100%">
        <button class="open-button" id="openButton">Mở bot</button>
        <button class="backup-button" id="backupButton">Bảo lưu</button>
        <button class="payment-button" id="paymentButton">Thanh toán</button>
      </div>

      <div class="note">
        <i id="schedule_backup_note"></i>
      </div>
    </div>
