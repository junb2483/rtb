    <div id="avatarModal" class="modal">

    <script>
      const themeToggle = document.getElementById("themeToggle");
      const body = document.body;

      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") {
        body.classList.add("light-theme");
        themeToggle.textContent = "🌙";
      } else {
        themeToggle.textContent = "🌞";
      }

      themeToggle.addEventListener("click", () => {
        body.classList.toggle("light-theme");
        const isLightTheme = body.classList.contains("light-theme");
        localStorage.setItem("theme", isLightTheme ? "light" : "dark");
        themeToggle.textContent = isLightTheme ? "🌙" : "🌞";
      });

      let isCooldownActive = false;
      let cooldownTime = 4;
      let spamCount = 0;

      function startCooldown(seconds) {
        const fetchButton = document.getElementById("fetchButton");
        const usernameInput = document.getElementById("usernameInput");
        const cooldownTimer = document.getElementById("cooldownTimer");

        isCooldownActive = true;
        fetchButton.disabled = true;
        usernameInput.disabled = true;
        cooldownTimer.style.display = "block";

        let remainingTime = seconds;
        cooldownTimer.textContent = `Please wait ${remainingTime} seconds before fetching again.`;

        const interval = setInterval(() => {
          remainingTime -= 1;
          cooldownTimer.textContent = `Please wait ${remainingTime} seconds before fetching again.`;

          if (remainingTime <= 0) {
            clearInterval(interval);
            fetchButton.disabled = false;
            usernameInput.disabled = false;
            cooldownTimer.style.display = "none";
            isCooldownActive = false;
            spamCount = 0;
          }
        }, 1000);
      }

      async function getCountryName(countryCode) {
        try {
          const response = await fetch(
            `https://restcountries.com/v3.1/alpha/${countryCode}`
          );
          if (!response.ok)
            throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          return data[0]?.name?.common || "Unknown Country";
        } catch (error) {
          console.error("Error fetching country name:", error);
          return "Unknown Country";
        }
      }

      async function fetchData() {
        if (isCooldownActive) {
          spamCount += 1;
          if (spamCount >= 5) cooldownTime = 10;
          alert(
            `Cooldown is active. Please wait ${cooldownTime} seconds before fetching again.`
          );
          return;
        }

        const username = document.getElementById("usernameInput").value.trim();
        const avatarImg = document.getElementById("avatar");
        const responseDisplay = document.getElementById("responseDisplay");
        const downloadContainer = document.getElementById("downloadContainer");
        avatarImg.style.display = "none";
        downloadContainer.style.display = "none";

        if (!username) {
          responseDisplay.textContent = "Please enter a username.";
          return;
        }

        startCooldown(cooldownTime);

        responseDisplay.innerHTML = `
        <div style="text-align: center;">
          <div class="loader"></div>
          <span style="font-size: 14px; color: gray;">Fetching data, It may take 5 seconds. "Please ensure that the entered username is correct"</span>
        </div>`;

        const workerUrl = `https://nopean.click/`;

        try {
          const response = await fetch(workerUrl, {
            method: "POST", // Changed to POST
            headers: {
              "Content-Type": "application/json",
              origin: "https://omar-thing.nekoweb.org",
            },
            body: JSON.stringify({ username }), // Send username in the body
          });

          if (!response.ok) {
            if (response.status === 429) {
              responseDisplay.textContent =
                "Rate limit exceeded. Please try again in a few seconds.";
            } else {
              responseDisplay.textContent =
                "Error: Please ensure the username is correct, with no '@' symbol.";
            }
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();

          if (!data || data.error) {
            responseDisplay.textContent =
              "Error: Unable to fetch user data. Please check the username or try again later.";
            return;
          }

          let displayText = "";

          if (data.nickname) {
            const regionImageUrl = data.region
              ? getFlagImageUrl(data.region)
              : "";
            const countryName = data.region
              ? await getCountryName(data.region)
              : "Unknown Country";

            displayText += `👤 Nickname: ${data.nickname}\n`;
            displayText += `👤 Username: ${data.username}\n`;
            displayText += `🌍 Region: ${data.region} ${
              regionImageUrl
                ? `<img src="${regionImageUrl}" class="flag" alt="Flag">`
                : ""
            } (${countryName})\n`;
            displayText += `🌐 Language: ${data.language}\n`;

            if (data.about) {
              const aboutText = data.about.replace(/\n/g, " ");
              displayText += `📜 About: ${aboutText}\n`;
            } else {
              displayText += `📜 About: User has no about\n`;
            }

            displayText += `🆔 User ID: ${data.userId}\n`;
            displayText += `📅 Account Created: ${data.accountCreated}\n`;
            displayText += `🕒 Nickname Modified: ${data.nicknameModified}\n\n`;

            if (data.stats) {
              displayText += `📊 Stats:\n`;
              displayText += `👥 Followers: ${data.stats.followers}\n`;
              displayText += `👤 Following: ${data.stats.following}\n`;
              displayText += `❤️ Hearts: ${data.stats.hearts}\n`;
              displayText += `🎥 Videos: ${data.stats.videos}\n`;
              displayText += `👫 Friends: ${data.stats.friends}\n`;
            }
          }

          if (data.avatar) {
            avatarImg.src = data.avatar;
            avatarImg.style.display = "block";
            downloadContainer.style.display = "block";
            downloadButton.onclick = () =>
              downloadImage(data.avatar, `${username}-avatar`);
          }

          responseDisplay.innerHTML = displayText;
        } catch (error) {
          console.error("Fetch error:", error);
          responseDisplay.textContent =
            "Error: Please make sure the entered username is correct, and does not include the @ symbol.";
        }
      }

      async function pasteUsername() {
        try {
          const text = await navigator.clipboard.readText();
          document.getElementById("usernameInput").value = text;
        } catch (error) {
          console.error("Failed to paste:", error);
        }
      }

      document.addEventListener("keydown", (event) => {
        const inputField = document.getElementById("usernameInput");
        if (document.activeElement !== inputField) inputField.focus();
      });

      document
        .getElementById("usernameInput")
        .addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            if (isCooldownActive) {
              spamCount += 1;
              if (spamCount >= 5) cooldownTime = 10;
              alert(
                `Cooldown is active. Please wait ${cooldownTime} seconds before fetching again.`
              );
            } else {
              fetchData();
            }
          }
        });

      document
        .getElementById("fetchButton")
        .addEventListener("click", fetchData);

      function getFlagImageUrl(countryCode) {
        return `https://flagcdn.com/w20/${countryCode.toLowerCase()}.png`;
      }

      function downloadImage(url, filename) {
        fetch(url)
          .then((response) => response.blob())
          .then((blob) => {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
          })
          .catch((error) => console.error("Error downloading image:", error));
      }

      const modal = document.getElementById("avatarModal");
      const modalImg = document.getElementById("fullAvatar");
      const avatarImg = document.getElementById("avatar");
      const closeModal = document.getElementsByClassName("close")[0];

      avatarImg.onclick = function () {
        modal.style.display = "block";
        modalImg.src = this.src;
      };

      closeModal.onclick = function () {
        modal.style.display = "none";
      };

      window.onclick = function (event) {
        if (event.target == modal) modal.style.display = "none";
      };

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") modal.style.display = "none";
      });
    </script>
