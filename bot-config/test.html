<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chọn Quốc Gia</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 20px;
      }
      select {
        width: 250px;
        height: 150px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <h3>Chọn Quốc Gia</h3>
    <select id="country-select" multiple>
      <option value="Vietnam">Việt Nam</option>
      <option value="USA">Hoa Kỳ</option>
      <option value="France">Pháp</option>
      <option value="Japan">Nhật Bản</option>
      <option value="Korea">Hàn Quốc</option>
    </select>

    <p>
      <strong>Quốc gia đã chọn:</strong>
      <span id="selected-countries">Chưa chọn</span>
    </p>

    <script>
      document
        .getElementById("country-select")
        .addEventListener("change", function () {
          const selectedOptions = Array.from(this.selectedOptions).map(
            (option) => option.text
          );
          document.getElementById("selected-countries").innerText =
            selectedOptions.join(", ") || "Chưa chọn";
        });
    </script>
  </body>
</html>
