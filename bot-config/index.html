<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Bot Config</title>
    <style>
      :root {
        --primary-color: #007bff;
        --light-bg: #f0f8ff;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        --radius: 14px;
        --border-color: #d0d7de;
        --text-color: #333;
        --label-color: #555;
        --error-color: #d00000;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: #e9ecef;
        color: var(--text-color);
        font-family: sans-serif;
        overflow-y: auto;
      }

      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 25px 20px;
        min-height: 100vh;
        box-sizing: border-box;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 16px;
        padding-top: 20px;
        padding-bottom: 25px;
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        border: 1px solid #ddd;
      }

      .title {
        margin-top: 0;
        text-align: center;
        margin-bottom: 15px;
        font-size: 1.6rem;
        font-weight: bold;
        color: var(--primary-color);
      }

      .field {
        margin-bottom: 9px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: var(--label-color);
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 0.95rem;
        background-color: #fff;
        color: var(--text-color);
      }

      textarea::placeholder,
      input::placeholder {
        color: #aaa;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.2);
      }

      .error {
        color: var(--error-color);
        font-size: 0.85rem;
        margin-top: 6px;
        text-align: left;
      }

      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: white;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        flex-direction: column;
      }
      .loading-message {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--primary-color);
        text-align: center;
      }
      .note {
        font-size: 0.9rem;
        color: #777;
        margin: 0px;
        margin-top: 10px;
        font-style: italic;
      }

      .note-important {
        color: var(--error-color);
        margin: 0px;
        font-size: 0.9rem;
        margin-top: 10px;
      }

      .note-link {
        font-size: 0.9rem;
        color: #555;
        text-align: center;
        margin-top: 10px;
      }

      .security_acc_note {
        font-size: 0.9rem;
        color: #555;
        margin-top: 5px;
        margin-bottom: 5px;
      }

      .security_acc_note a {
        color: var(--primary-color);
        text-decoration: none;
      }

      .security_acc_note a:hover {
        text-decoration: underline;
      }

      .restartButton,
      .saveButton {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-sizing: border-box;
        font-weight: bold;
        font-size: 16px;
        color: white;
        transition: background-color 0.3s ease;
      }

      .restartButton {
        background-color: #dc3545;
        width: 70%;
      }

      .restartButton:hover {
        background-color: #c82333;
      }

      .saveButton {
        background-color: var(--primary-color);
        width: 30%;
      }

      .saveButton:hover {
        background-color: #0069d9;
      }

      .regionButton {
        padding: 5px 5px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background-color: #f9f9f9;
        cursor: pointer;
        margin-right: 3px;
        font-size: 0.85rem;
        transition: background-color 0.3s;
        color: gray;
      }

      .regionButton:hover {
        background-color: var(--light-bg);
        border-color: var(--primary-color);
        color: var(--primary-color);
      }

      input[type="radio"] {
        accent-color: var(--primary-color);
      }

      .password-modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .password-modal.show {
        opacity: 1;
        visibility: visible;
      }

      .password-modal-content {
        background: white;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: left;
        animation: fadeIn 0.3s ease;
        box-sizing: border-box;
        padding: 20px;
      }

      .password-modal-content label {
        font-weight: bold;
        display: block;
      }
      .password-modal-content input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        margin-top: 5px;
      }

      .password-modal-buttons {
        display: flex;
        margin-top: 12px;
      }
      .password-modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      .btn-password-submit {
        background: #28a745;
        color: white;
      }
      .btn-password-cancel {
        background: #dc3545;
        color: white;
        margin-right: 10px;
      }
      .btn-password-submit:hover {
        background: #218838;
      }
      .btn-password-cancel:hover {
        background: #c82333;
      }
    </style>
  </head>
  <body>
    <div id="password-modal" class="password-modal">
      <div class="password-modal-content">
        <label>Nhập mật khẩu: </label>
        <input type="password" id="password" placeholder="Mật khẩu" />
        <div class="password-modal-buttons">
          <button id="btn-password-cancel" class="btn-password-cancel">
            Đóng
          </button>
          <button id="btn-password-submit" class="btn-password-submit">
            Xác nhận
          </button>
        </div>
      </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
      <div id="loading-message" class="loading-message">
        Đang tải dữ liệu ...
      </div>
      <p class="note">
        <i>
          "🔥 Tạo bot, liên hệ telegram
          <a
            href="https://t.me/cp_junb_bot_2483"
            style="color: #007bff; font-weight: bold; margin-bottom: 10px"
            >JunB</a
          >, giá công khai
          <a
            href="https://i.junb.io.vn"
            style="color: #007bff; font-weight: bold; margin-bottom: 10px"
            >tại đây</a
          >
          !"
        </i>
      </p>
      <p class="note">"Những thay đổi cần khoảng 1 phút để bot tiếp nhận"</p>
      <p class="note note-important">"Nếu để lộ link này, bot có thể hỏng"</p>
    </div>
    <div class="wrapper">
      <div class="container">
        <h2 id="bot-title" class="title">Bot Config</h2>

        <div class="form-content">
          <div class="field" style="display: flex; align-items: center">
            <div style="display: flex; align-items: center">
              <label
                style="display: flex; align-items: center; margin-right: 10px"
              >
                <input type="checkbox" id="bag" name="mode" value="BAG" />
                <span style="line-height: 1; margin-left: 3px">🟪 Túi</span>
              </label>

              <label
                style="display: flex; align-items: center; margin-right: 10px"
              >
                <input type="checkbox" id="box" name="mode" value="BOX" />
                <span style="line-height: 1; margin-left: 3px">🎁 Rương</span>
              </label>

              <label style="display: flex; align-items: center">
                <input type="checkbox" id="filter_type" name="filter_type" />
                <span style="line-height: 1; margin-left: 3px">Nâng cao</span>
              </label>
            </div>
          </div>

          <div id="levelField" class="field">
            <label for="min_level">Gửi khi level nhỏ hơn/bằng:</label>
            <input type="text" id="min_level" name="min_level" />
            <div id="max_level_error" class="error"></div>
          </div>

          <div id="minCoinsField" class="field">
            <label for="min_coins">Gửi khi có xu tối thiểu:</label>
            <input type="text" id="min_coins" name="min_coins" />
            <div id="min_coins_error" class="error"></div>
          </div>
          <div id="minRateField" class="field">
            <label for="min_rate">Tỷ lệ tối thiểu (Số xu/Số người):</label>
            <input type="text" id="min_rate" name="min_rate" />
            <div id="min_rate_error" class="error"></div>
          </div>
          <div id="minSecsField" class="field">
            <label for="min_secs">Gửi khi thời gian nhỏ hơn (giây):</label>
            <input type="text" id="min_secs" name="min_secs" />
            <div id="min_secs_error" class="error"></div>
          </div>

          <div id="filterQueryField" class="field">
            <label id="filter_query_label" for="filter_query"
              >Mã rương thông thường:</label
            >
            <textarea
              id="filter_query"
              name="filter_query"
              rows="2"
              placeholder="@IS_BAG, @IS_BOX, @TIME, @RATE, @IS_GOLDEN_BOX, @VIEWERS, @COINS, @LEVEL, @RECEIVERS"
              oninput="this.value = this.value.toUpperCase();"
            ></textarea>
            <div id="filter_query_error" class="error"></div>
          </div>

          <div id="filterSpecialQueryField" class="field">
            <label id="filter_special_query_label" for="filter_special_query"
              >Mã rương tiềm năng:</label
            >
            <textarea
              id="filter_special_query"
              name="filter_special_query"
              rows="2"
              placeholder="@IS_BAG, @IS_BOX, @TIME, @RATE, @IS_GOLDEN_BOX, @VIEWERS, @COINS, @LEVEL, @RECEIVERS"
              oninput="this.value = this.value.toUpperCase();"
            ></textarea>
            <div id="filter_special_query_error" class="error"></div>
          </div>

          <div
            id="boxTypesField"
            class="field"
            style="
              display: flex;
              align-items: center;
              padding-bottom: 0;
              padding-top: 5px;
              margin-bottom: 7px;
              margin-top: -5px;
            "
          >
            <div style="display: flex; align-items: center">
              <label
                style="display: flex; align-items: center; margin-right: 8px"
              >
                <input
                  type="checkbox"
                  id="use_golden_box"
                  name="use_golden_box"
                  value="1"
                />
                <span style="line-height: 1">🟡</span>
                <span style="line-height: 1; margin-left: 2px">Rương vàng</span>
              </label>

              <label style="display: flex; align-items: center">
                <input
                  type="checkbox"
                  id="use_hang_box"
                  name="use_hang_box"
                  value="1"
                />
                <span style="line-height: 1">🧤</span>
                <span style="line-height: 1; margin-left: 2px">Rương treo</span>
              </label>
            </div>

            <div style="display: flex; align-items: center">
              <label style="display: flex; align-items: center">
                <input
                  type="checkbox"
                  id="use_only_hang_box"
                  name="use_only_hang_box"
                  value="1"
                />
                <span style="line-height: 1">🧤</span>
                <span style="line-height: 1; margin-left: 2px"
                  >Chỉ gửi rương treo</span
                >
              </label>
            </div>
          </div>

          <div class="field" id="div_accounts">
            <label for="accounts">Những id follow idol:</label>

            <textarea
              id="accounts"
              name="accounts"
              rows="2"
              placeholder=" id1, id2, ..."
              style="width: 100%"
            ></textarea>

            <div class="security_acc_note">
              <a
                id="copy_acc_code_btn"
                href="javascript:void(0)"
                style="color: inherit"
              >
                🗒 Nhấn
                <b><span style="color: #007bff">vào đây</span></b> bảo vệ id
                tiktok
              </a>

              <a href="https://vimeo.com/1024175938?share=copy"> (video) </a>
            </div>

            <div id="accounts_error" class="error"></div>

            <label for="only_regions">
              <button id="allButton" type="button" class="regionButton">
                Tất cả vùng
              </button>

              <button id="asiaButton" type="button" class="regionButton">
                Châu Á
              </button>
              <button id="europeButton" type="button" class="regionButton">
                Châu Âu
              </button>
              <button
                id="customButton"
                type="button"
                class="regionButton"
                style="border: none"
              >
                Tùy chọn
              </button>
            </label>

            <textarea
              id="only_regions"
              name="only_regions"
              rows="1"
              placeholder="Cờ 1, Cờ 2, ..."
              style="width: 100%; margin-top: 5px"
            ></textarea>
            <div id="only_regions_error" class="error"></div>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <button type="button" id="restartButton" class="restartButton">
            Khởi động lại
          </button>
          <button type="button" id="submitButton" class="saveButton">
            Lưu
          </button>
        </div>
      </div>
    </div>
