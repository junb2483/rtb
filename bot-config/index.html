        ).sort(),
        america: getFlags(
          "рҹҮҰрҹҮ· рҹҮ§рҹҮё рҹҮ§рҹҮ§ рҹҮ§рҹҮҙ рҹҮ§рҹҮ· рҹҮЁрҹҮҰ рҹҮЁрҹҮұ рҹҮЁрҹҮҙ рҹҮЁрҹҮ· рҹҮЁрҹҮә рҹҮ©рҹҮҙ рҹҮӘрҹҮЁ рҹҮёрҹҮ» рҹҮ¬рҹҮ« рҹҮ¬рҹҮ№ рҹҮӯрҹҮ№ рҹҮӯрҹҮі рҹҮҜрҹҮІ рҹҮІрҹҮ¶ рҹҮІрҹҮҪ рҹҮірҹҮ® рҹҮөрҹҮҰ рҹҮөрҹҮҫ рҹҮөрҹҮӘ рҹҮөрҹҮ· рҹҮәрҹҮё рҹҮәрҹҮҫ рҹҮ»рҹҮӘ рҹҮ»рҹҮ® рҹҮҰрҹҮё рҹҮҰрҹҮ¬ рҹҮҰрҹҮ® рҹҮ§рҹҮҝ рҹҮ§рҹҮІ рҹҮ»рҹҮ¬ рҹҮ§рҹҮ¶ рҹҮ°рҹҮҫ рҹҮЁрҹҮј рҹҮ©рҹҮІ рҹҮ«рҹҮ° рҹҮ¬рҹҮ© рҹҮ¬рҹҮҫ рҹҮұрҹҮЁ рҹҮ°рҹҮі рҹҮ»рҹҮЁ рҹҮ№рҹҮ№ рҹҮ№рҹҮЁ рҹҮёрҹҮ· рҹҮ¬рҹҮұ рҹҮҰрҹҮј"
        ).sort(),
        oceania: getFlags(
          "рҹҮҰрҹҮә рҹҮ«рҹҮҜ рҹҮөрҹҮ« рҹҮ¬рҹҮә рҹҮ°рҹҮ® рҹҮІрҹҮӯ рҹҮ«рҹҮІ рҹҮірҹҮ· рҹҮірҹҮҝ рҹҮөрҹҮ¬ рҹҮөрҹҮі рҹҮјрҹҮё рҹҮёрҹҮ§ рҹҮ№рҹҮ° рҹҮ№рҹҮҙ рҹҮ№рҹҮ» рҹҮ»рҹҮә рҹҮҰрҹҮ¶ рҹҮірҹҮЁ рҹҮірҹҮә рҹҮірҹҮ« рҹҮөрҹҮј рҹҮјрҹҮ« рҹҮЁрҹҮ° рҹҮЁрҹҮҪ рҹҮЁрҹҮЁ"
        ).sort(),
      };

      function updateSelectRegionsStyle() {
        const currentOnlyRegions =
          document.getElementById("only_regions").value;

        if (currentOnlyRegions?.trim?.() === "") {
          document.getElementById("allButton").style.color = "#007bff";
          document.getElementById("asiaButton").style.color = "black";
          document.getElementById("europeButton").style.color = "black";
          document.getElementById("customButton").style.color = "gray";
        } else if (
          getFlags(currentOnlyRegions).sort().join("") ===
          flagsByContinent.asia.join("")
        ) {
          document.getElementById("allButton").style.color = "black";
          document.getElementById("asiaButton").style.color = "#007bff";
          document.getElementById("europeButton").style.color = "black";
          document.getElementById("customButton").style.color = "gray";
        } else if (
          getFlags(currentOnlyRegions).sort().join("") ===
          flagsByContinent.europe.join("")
        ) {
          document.getElementById("allButton").style.color = "black";
          document.getElementById("asiaButton").style.color = "black";
          document.getElementById("europeButton").style.color = "#007bff";
          document.getElementById("customButton").style.color = "gray";
        } else {
          document.getElementById("allButton").style.color = "black";
          document.getElementById("asiaButton").style.color = "black";
          document.getElementById("europeButton").style.color = "black";
          document.getElementById("customButton").style.color = "#007bff";
        }
      }

      let isSubmitting = false;

      async function loadData() {
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMessage = document.getElementById("loading-message");
        const formContent = document.querySelector(".form-content");

        loadingMessage.textContent = "Дҗang tбәЈi dб»Ҝ liб»Үu ..."; // ThГҙng bГЎo loading ban Д‘бә§u
        loadingOverlay.style.display = "flex"; // Hiб»ғn thб»Ӣ thГҙng bГЎo loading
        formContent.style.display = "none"; // бәЁn cГЎc trЖ°б»қng nhбәӯp liб»Үu vГ  nГәt cбәӯp nhбәӯt

        try {
          const response = await fetch(
            `https://script.google.com/macros/s/AKfycbz-Zn95LjnD8RgqZe8Agwx3fXADmlecT3UXHs5ijMRQheMzuti3PVtriYdIKfZwRSW_YQ/exec?action=get_public_bot_info&access_token=${accessToken}`
          );
          data = await response.json();

          // GГЎn giГЎ trб»Ӣ cho cГЎc trЖ°б»қng
          document.getElementById("min_coins").value = data.MIN_COINS;
          document.getElementById("min_rate").value = data.MIN_RATE;
          document.getElementById("min_level").value = data.MIN_LEVEL;
          document.getElementById("min_secs").value = data.MIN_SECS;
          document.getElementById("accounts").value = data.USER_IDS;
          document.getElementById("only_regions").value = data.ONLY_REGIONS;

          document.getElementById("box").checked =
            data.MODE === "BOX" || !data.MODE;
          document.getElementById("bag").checked = data.MODE === "BAG";

          // Cбәӯp nhбәӯt tiГӘu Д‘б»Ғ vб»ӣi tГӘn bot
          document.getElementById(
            "bot-title"
          ).textContent = `Bot ${data.bot_name}`;

          updateViewWithMode(data.MODE);
          updateSelectRegionsStyle();

          // Hiб»ғn thб»Ӣ giao diб»Үn sau khi dб»Ҝ liб»Үu Д‘Ж°б»Јc tбәЈi xong
          loadingOverlay.style.display = "none"; // бәЁn thГҙng bГЎo loading
          formContent.style.display = "block"; // Hiб»ғn thб»Ӣ lбәЎi cГЎc trЖ°б»қng nhбәӯp liб»Үu vГ  nГәt cбәӯp nhбәӯt
        } catch (error) {
          console.error("Lб»—i khi gб»Қi API:", error);
          loadingMessage.textContent = "Lб»—i khi tбәЈi dб»Ҝ liб»Үu.";
        }
      }

      async function submitForm() {
        const submitButton = document.getElementById("submitButton");
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMessage = document.getElementById("loading-message");
        const formContent = document.querySelector(".form-content");

        document.getElementById("accounts").value = (
          document.getElementById("accounts").value || ""
        )
          .split(/[\s\n\t,]+/g)
          .join(" ")
          .toLowerCase();

        document.getElementById("only_regions").value = getFlags(
          document.getElementById("only_regions").value || ""
        ).join(" ");

        if (validateForm() && !isSubmitting) {
          isSubmitting = true;
          submitButton.disabled = true; // VГҙ hiб»Үu hГіa nГәt cбәӯp nhбәӯt
          loadingMessage.textContent = "Дҗang gб»ӯi dб»Ҝ liб»Үu ..."; // ThГҙng bГЎo loading khi gб»ӯi dб»Ҝ liб»Үu
          loadingOverlay.style.display = "flex"; // Hiб»ғn thб»Ӣ thГҙng bГЎo loading
          formContent.style.display = "none"; // бәЁn cГЎc trЖ°б»қng nhбәӯp liб»Үu

          const minCoins = document.getElementById("min_coins").value;
          const minRate = document.getElementById("min_rate").value;
          const minLevel = document.getElementById("min_level").value;
          const minSecs = document.getElementById("min_secs").value;
          const userIds = document.getElementById("accounts").value || "";
          const onlyRegions =
            document.getElementById("only_regions").value || "";

          const mode = document.getElementById("bag").checked ? "BAG" : "BOX";

          try {
            const response = await fetch(
              `https://script.google.com/macros/s/AKfycbz-Zn95LjnD8RgqZe8Agwx3fXADmlecT3UXHs5ijMRQheMzuti3PVtriYdIKfZwRSW_YQ/exec?action=update_bot_config&access_token=${accessToken}&MIN_COINS=${minCoins}&MIN_RATE=${minRate}&MIN_LEVEL=${minLevel}&MIN_SECS=${minSecs}&USER_IDS=${(
                userIds || ""
              ).trim()}&MODE=${mode}&ONLY_REGIONS=${onlyRegions}`
            );
            const data = await response.json();
            console.log(data);

            if (data.success) {
              alert(data?.message || "Dб»Ҝ liб»Үu Д‘ГЈ Д‘Ж°б»Јc cбәӯp nhбәӯt thГ nh cГҙng.");
            } else {
              alert("CГі lб»—i xбәЈy ra khi cбәӯp nhбәӯt dб»Ҝ liб»Үu.");
            }
          } catch (error) {
            console.error("Lб»—i khi gб»ӯi dб»Ҝ liб»Үu:", error);
            alert("Lб»—i khi gб»ӯi dб»Ҝ liб»Үu.");
          }

          // Hiб»ғn thб»Ӣ lбәЎi nГәt cбәӯp nhбәӯt vГ  cГЎc trЖ°б»қng nhбәӯp liб»Үu
          submitButton.disabled = false;
          loadingOverlay.style.display = "none";
          formContent.style.display = "block";
          isSubmitting = false;
        }
      }

      function validateForm() {
        let isValid = true;

        // XГіa lб»—i trЖ°б»ӣc khi kiб»ғm tra
        document.getElementById("min_coins_error").innerText = "";
        document.getElementById("min_rate_error").innerText = "";
        document.getElementById("min_secs_error").innerText = "";
        document.getElementById("accounts_error").innerText = "";
        document.getElementById("only_regions_error").innerText = "";

        // Kiб»ғm tra MIN_COINS
        const minCoins = document.getElementById("min_coins").value;
        if (minCoins === "" || isNaN(minCoins)) {
          document.getElementById("min_coins_error").innerText =
            "Vui lГІng nhбәӯp giГЎ trб»Ӣ hб»Јp lб»Ү cho MIN_COINS.";
          isValid = false;
        }

        // Kiб»ғm tra MIN_RATE
        const minRate = document.getElementById("min_rate").value;
        if (minRate === "" || isNaN(minRate)) {
          document.getElementById("min_rate_error").innerText =
            "Vui lГІng nhбәӯp giГЎ trб»Ӣ hб»Јp lб»Ү cho MIN_RATE.";
          isValid = false;
        }

        // Kiб»ғm tra MIN_LEVEL
        const minLevel = document.getElementById("min_level").value;
        if (minLevel === "" || isNaN(minLevel)) {
          document.getElementById("min_level_error").innerText =
            "Vui lГІng nhбәӯp giГЎ trб»Ӣ hб»Јp lб»Ү cho MIN_LEVEL.";
          isValid = false;
        }

        // Kiб»ғm tra MIN_SECS
        const minSecs = document.getElementById("min_secs").value;
        if (minSecs === "" || isNaN(minSecs)) {
          document.getElementById("min_secs_error").innerText =
            "Vui lГІng nhбәӯp giГЎ trб»Ӣ hб»Јp lб»Ү cho MIN_SECS.";
          isValid = false;
        }

        // Kiб»ғm tra USER_IDS
        const maxAccount = 20;
        const userIds = document.getElementById("accounts").value;
        if (userIds && userIds.split(/[\s\n\t,]+/g).length > maxAccount) {
          document.getElementById(
            "accounts_error"
          ).innerText = `Tб»‘i Д‘a chб»ү Д‘Ж°б»Јc ${maxAccount} tГ i khoбәЈn`;
          isValid = false;
        }

        return isValid;
      }

      function confirmRestart() {
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMessage = document.getElementById("loading-message");
        const formContent = document.querySelector(".form-content");

        const confirmed = confirm("BбәЎn muб»‘n khб»ҹi Д‘б»ҷng lбәЎi bot?");
        if (confirmed) {
          loadingMessage.textContent = "Дҗang gб»ӯi yГӘu cбә§u ..."; // ThГҙng bГЎo loading ban Д‘бә§u
          loadingOverlay.style.display = "flex"; // Hiб»ғn thб»Ӣ thГҙng bГЎo loading
          formContent.style.display = "none"; // бәЁn cГЎc trЖ°б»қng nhбәӯp liб»Үu vГ  nГәt cбәӯp nhбәӯt

          fetch(
            `https://script.google.com/macros/s/AKfycbz-Zn95LjnD8RgqZe8Agwx3fXADmlecT3UXHs5ijMRQheMzuti3PVtriYdIKfZwRSW_YQ/exec?action=restart_bot&access_token=${accessToken}`
          )
            .then(async (response) => {
              const data = await response.json();
              alert(data?.message || "OK");
            })
            .catch((error) => {
              alert("KhГҙng thб»ғ khб»ҹi Д‘б»ҷng lбәЎi bot ngay lГәc nГ y !");
            })
            .finally(() => {
              // Hiб»ғn thб»Ӣ giao diб»Үn sau khi dб»Ҝ liб»Үu Д‘Ж°б»Јc tбәЈi xong
              loadingOverlay.style.display = "none"; // бәЁn thГҙng bГЎo loading
              formContent.style.display = "block"; // Hiб»ғn thб»Ӣ lбәЎi cГЎc trЖ°б»қng nhбәӯp liб»Үu vГ  nГәt cбәӯp nhбәӯt
            });
        }
      }

      let typingTimer;
      function onChangeOnlyRegions(event) {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
          updateSelectRegionsStyle();
          document.getElementById("only_regions").value = getFlags(
            document.getElementById("only_regions").value || ""
          ).join(" ");
        }, 1000);
      }

      function onPressAll() {
        document.getElementById("only_regions").value = "";
        updateSelectRegionsStyle();
      }

      function onPressAsia() {
        document.getElementById("only_regions").value =
          flagsByContinent.asia.join(" ");
        updateSelectRegionsStyle();
      }

      function onPressEurope() {
        document.getElementById("only_regions").value =
          flagsByContinent.europe.join(" ");

        updateSelectRegionsStyle();
      }

      function onPressCustom() {
        document.getElementById("only_regions").focus();
      }

      function copySecurityAccCodeToClipboard() {
        const text = data?.security_acc_code
          ? `#lock/${data?.security_acc_code}`
          : "";
        if (!text) return;

        navigator.clipboard
          .writeText(text)
          .then(() => {
            alert(
              "ДҗГЈ sao chГ©p mГЈ khГіa tГ i khoбәЈn tiktok, dГЎn vГ o bio cГЎc acc TikTok cбә§n chбә·n, hб»Ү thб»‘ng sбәҪ tб»ұ Д‘б»ҷng vГҙ hiб»Үu hГіa ngЖ°б»қi khГЎc sб»ӯ dб»Ҙng vГ o bot (ngoбәЎi trб»« bot cб»§a bбәЎn)!"
            );
          })
          .catch((err) => {
            console.error("KhГҙng thб»ғ sao chГ©p: ", err);
          });
      }

      document.querySelectorAll('input[name="mode"]').forEach((radio) => {
        radio.addEventListener("change", (event) => {
          updateViewWithMode(event.target.value);
        });
      });

      window.onload = loadData;
    </script>
