<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bot Config</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
        overflow: hidden; /* Ngăn cuộn khi loading */
      }
      .container {
        width: 100%;
        max-width: 500px; /* Đặt chiều rộng tối đa */
        height: 400px; /* Đặt chiều cao cố định */
        margin: 0 auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        position: relative;
        z-index: 1; /* Đảm bảo container nằm dưới overlay */
      }
      .title {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5rem;
      }
      .field {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        box-sizing: border-box;
      }
      button:disabled {
        background-color: #ddd;
        cursor: not-allowed;
      }
      button:hover {
        background-color: #45a049;
      }
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fff; /* Không mờ */
        display: none; /* Ẩn lớp overlay mặc định */
        justify-content: center;
        align-items: center;
        z-index: 1000; /* Đặt z-index để hiển thị trên tất cả các thành phần khác */
      }
      .loading-message {
        font-size: 1.5rem;
        color: #333;
        font-weight: bold;
        text-align: center;
      }
      .hidden {
        display: none;
      }
      .error {
        color: red;
        font-size: 0.9rem;
        margin-top: 10px;
        text-align: center;
      }
      .note {
        font-size: 0.9rem;
        color: #555;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay" class="loading-overlay">
      <div id="loading-message" class="loading-message">
        Đang tải dữ liệu...
      </div>
    </div>
    <div class="container">
      <h2 class="title">Bot Config</h2>
      <div class="form-content">
        <div class="field">
          <label for="min_coins">MIN_COINS:</label>
          <input type="text" id="min_coins" name="min_coins" />
          <div id="min_coins_error" class="error"></div>
        </div>
        <div class="field">
          <label for="min_rate">MIN_RATE:</label>
          <input type="text" id="min_rate" name="min_rate" />
          <div id="min_rate_error" class="error"></div>
        </div>
        <div class="field">
          <label for="min_secs">MIN_SECS:</label>
          <input type="text" id="min_secs" name="min_secs" />
          <div id="min_secs_error" class="error"></div>
        </div>
        <button type="button" id="submitButton" onclick="submitForm()">
          CẬP NHẬT
        </button>
      </div>
      <div class="note">
        Những thay đổi của bạn (bot) cần 1 đến 10 phút để áp dụng
      </div>
    </div>

    <script>
      let isSubmitting = false;

      async function loadData() {
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMessage = document.getElementById("loading-message");
        const formContent = document.querySelector(".form-content");

        loadingMessage.textContent = "Đang tải dữ liệu..."; // Thông báo loading ban đầu
        loadingOverlay.style.display = "flex"; // Hiển thị thông báo loading
        formContent.style.display = "none"; // Ẩn các trường nhập liệu và nút cập nhật

        try {
          const response = await fetch(
            `https://script.google.com/macros/s/AKfycbwtyLwYFcpSgehBpKjYP4jbcd6X_Vhz4YWJ2waawFecT2HIcNdgS4qC5RaPXYqJA10xMA/exec?action=get_bot_config&access_token=${accessToken}`
          );
          const data = await response.json();

          // Gán giá trị cho các trường
          document.getElementById("min_coins").value = data.MIN_COINS;
          document.getElementById("min_rate").value = data.MIN_RATE;
          document.getElementById("min_secs").value = data.MIN_SECS;

          // Hiển thị giao diện sau khi dữ liệu được tải xong
          loadingOverlay.style.display = "none"; // Ẩn thông báo loading
          formContent.style.display = "block"; // Hiển thị lại các trường nhập liệu và nút cập nhật
        } catch (error) {
          console.error("Lỗi khi gọi API:", error);
          loadingMessage.textContent = "Lỗi khi tải dữ liệu.";
        }
      }

      async function submitForm() {
        const submitButton = document.getElementById("submitButton");
        const loadingOverlay = document.getElementById("loading-overlay");
        const loadingMessage = document.getElementById("loading-message");
        const formContent = document.querySelector(".form-content");

        if (validateForm() && !isSubmitting) {
          isSubmitting = true;
          submitButton.disabled = true; // Vô hiệu hóa nút cập nhật
          loadingMessage.textContent = "Đang gửi dữ liệu..."; // Thông báo loading khi gửi dữ liệu
          loadingOverlay.style.display = "flex"; // Hiển thị thông báo loading
          formContent.style.display = "none"; // Ẩn các trường nhập liệu

          const minCoins = document.getElementById("min_coins").value;
          const minRate = document.getElementById("min_rate").value;
          const minSecs = document.getElementById("min_secs").value;
          const accessToken = "test"; // Thay thế bằng access token thực tế nếu cần

          try {
            const response = await fetch(
              `https://script.google.com/macros/s/AKfycbwtyLwYFcpSgehBpKjYP4jbcd6X_Vhz4YWJ2waawFecT2HIcNdgS4qC5RaPXYqJA10xMA/exec?action=update_bot_config&access_token=${accessToken}&MIN_COINS=${minCoins}&MIN_RATE=${minRate}&MIN_SECS=${minSecs}`
            );
            const data = await response.json();
            console.log(data);

            if (data.success) {
              alert("Dữ liệu đã được cập nhật thành công.");
            } else {
              alert("Có lỗi xảy ra khi cập nhật dữ liệu.");
            }
          } catch (error) {
            console.error("Lỗi khi gửi dữ liệu:", error);
            alert("Lỗi khi gửi dữ liệu.");
          }

          // Hiển thị lại nút cập nhật và các trường nhập liệu
          submitButton.disabled = false;
          loadingOverlay.style.display = "none";
          formContent.style.display = "block";
          isSubmitting = false;
        }
      }

      function validateForm() {
        let isValid = true;

        // Xóa lỗi trước khi kiểm tra
        document.getElementById("min_coins_error").innerText = "";
        document.getElementById("min_rate_error").innerText = "";
        document.getElementById("min_secs_error").innerText = "";

        // Kiểm tra MIN_COINS
        const minCoins = document.getElementById("min_coins").value;
        if (minCoins === "" || isNaN(minCoins)) {
          document.getElementById("min_coins_error").innerText =
            "Vui lòng nhập giá trị hợp lệ cho MIN_COINS.";
          isValid = false;
        }

        // Kiểm tra MIN_RATE
        const minRate = document.getElementById("min_rate").value;
        if (minRate === "" || isNaN(minRate)) {
          document.getElementById("min_rate_error").innerText =
            "Vui lòng nhập giá trị hợp lệ cho MIN_RATE.";
          isValid = false;
        }

        // Kiểm tra MIN_SECS
        const minSecs = document.getElementById("min_secs").value;
        if (minSecs === "" || isNaN(minSecs)) {
          document.getElementById("min_secs_error").innerText =
            "Vui lòng nhập giá trị hợp lệ cho MIN_SECS.";
          isValid = false;
        }

        return isValid;
      }

      // Tải dữ liệu khi trang được tải
      window.onload = loadData;
    </script>
  </body>
</html>
