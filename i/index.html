<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mở link trả phí</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 100%;
        padding: 20px;
      }
      h2 {
        color: #333;
        width: 90%;
        margin: 0 auto 10px auto;
        text-align: center;
        white-space: normal;
        overflow-wrap: break-word;
        word-wrap: break-word;
      }
      button {
        padding: 10px 20px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        border-radius: 17px;
        background-color: #007bff;
        color: #fff;
        margin-left: 5px;
        margin-right: 5px;
      }
      /* Mã hiển thị (device_id rút gọn) dễ bị đọc/gõ nhầm "0"/"O" ở font thường (Arial) —
         monospace phân biệt rõ hình dạng ký tự hơn, slashed-zero ép số 0 có gạch chéo, không
         thể lẫn với chữ O nữa. */
      #txt_message,
      #txt_id {
        font-family:
          ui-monospace, "SF Mono", SFMono-Regular, Consolas, "Liberation Mono",
          Menlo, monospace;
        font-variant-numeric: slashed-zero;
      }
    </style>
  </head>
  <body>
    <h2
      id="txt_id"
      style="position: absolute; bottom: 0px; font-size: 10px; color: #e5e4e2"
    ></h2>
    <div class="container">
      <h2 id="txt_message">💡 Xác minh người dùng</h2>
      <button id="copyBtn" style="display: none; background-color: red">
        <b>LẤY MÃ</b></button
      ><button id="openLinkBtn"><b>MỞ LINK</b></button>
    </div>
