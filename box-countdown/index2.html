<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Canh thời gian mở rương/túi</title>
    <style>
      html,
      body {
        visibility: hidden;
      }
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0;
        text-align: center;
        min-height: 100vh;
        overflow-y: auto;
      }
      #changeUIBtn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 8888;
        padding: 10px 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }
      #changeUIBtn:hover {
        background-color: #0056b3;
      }
      .info {
        font-size: 2.8rem;
        padding: 1px;
        border-radius: 8px;
      }
      .countdown {
        font-size: 2.8rem;
        border-radius: 8px;
        font-weight: bold;
      }
      .info {
        font-size: 2rem;
      }
      .time {
        margin-top: 5px;
        font-size: 1.2rem;
        font-style: italic;
      }
      .cb {
        background: #3e5c76;
        color: #fff;
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        margin-top: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        display: inline-block;
        -webkit-user-select: none;
        /* Safari */
        -ms-user-select: none;
        /* IE 10+ */
        user-select: none;
        /* Standard */
      }
      .note {
        padding: 5px;
        margin-top: 5px;
        font-size: 1.2rem;
        font-style: italic;
        width: 60%;
      }
      @media (max-width: 600px) {
        .info {
          font-size: 1.5rem;
          padding: 15px;
        }
        .note {
          font-size: 1.2rem;
          margin-top: 20px;
        }
        .time {
          font-size: 2rem;
        }
        .countdown {
          font-size: 5.5rem;
          padding-top: 15px;
          padding-left: 15px;
          padding-right: 15px;
        }
      }
      .btn-open {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .btn-open:hover {
        background: #0056b3;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      .modal.show {
        opacity: 1;
        visibility: visible;
      }
      .modal-content {
        background: white;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: left;
        animation: fadeIn 0.3s ease;
        box-sizing: border-box;
        padding: 20px;
      }
      @keyframes fadeIn {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .modal-content h2 {
        margin-top: 0;
        font-size: 20px;
        text-align: center;
      }
      .modal-content label {
        font-weight: bold;
        display: block;
      }
      .modal-content input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        margin-top: 5px;
        margin-bottom: 10px;
      }
      .modal-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }
      .modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .btn-submit {
        background: #28a745;
        color: white;
        margin-right: 10px;
      }
      .btn-cancel {
        background: #dc3545;
        color: white;
      }
      .btn-submit:hover {
        background: #218838;
      }
      .btn-cancel:hover {
        background: #c82333;
      }

      #delta-control {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
      }
      #delta-text {
        font-size: 18px;
      }
      .btn-increase {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        background: #218838;
        color: white;
      }
      .btn-decrease {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        background: #c82333;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="info" id="info"></div>
    <div class="countdown" id="countdown">Loading...</div>
    <div class="time" id="time"></div>

    <div id="delta-control">
      <button id="btn-decrease-0.01" class="btn-decrease">-0.01</button>
      <button id="btn-decrease-0.05" class="btn-decrease">-0.05</button>
      <span id="delta-text"></span>
      <button id="btn-increase-0.05" class="btn-increase">+0.05</button>
      <button id="btn-increase-0.01" class="btn-increase">+0.01</button>
    </div>
    <div class="note">
      <button class="cb" id="claimBtn" style="visibility: hidden">COPY</button>
      <button
        class="cb"
        id="claimChangeBtn"
        style="
          padding-left: 10px;
          padding-right: 10px;
          margin-left: 10px;
          visibility: hidden;
        "
      >
        +
      </button>
    </div>
    <div id="modal" class="modal">
      <div class="modal-content">
        <label>Thời gian bắt đầu:</label>
        <input type="number" id="start_seconds" placeholder="Ví dụ nhập 0.7" />

        <label>Thời gian kết thúc:</label>
        <input type="number" id="end_seconds" placeholder="Ví dụ nhập 0.1" />

        <label>Hiển thị màu nền:</label>
        <div
          style="
            display: flex;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 10px;
          "
        >
          <input
            type="color"
            id="hex_background_color"
            placeholder="Mã màu sắc, ví dụ nhập #ff0000"
            value="#ff0000"
            style="
              height: 40px;
              padding: 0px;
              margin-right: 10px;
              margin-top: 0px;
              margin-bottom: 0px;
            "
          />
          <span
            id="openColorPicker"
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              white-space: nowrap;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 5px;
              font-size: 16px;
              height: 35px;
              padding: 0 10px;
            "
            >Chọn màu</span
          >
        </div>

        <div class="modal-buttons">
          <button id="btn-submit" class="btn-submit">Thêm</button>
          <button id="btn-cancel" class="btn-cancel">Đóng</button>
        </div>
      </div>
    </div>

    <div
      id="config-container"
      style="
        margin-top: 20px;
        margin-bottom: 30px;
        padding: 15px;
        max-width: 500px;
        border-radius: 10px;
        border: 2px solid gray;
      "
    >
      <button id="btn-open" class="btn-open">
        Thêm màu sắc theo thời gian
      </button>
      <div id="color-display"></div>
    </div>
    <button id="changeUIBtn">Theme</button>
