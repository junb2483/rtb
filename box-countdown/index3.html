    <style>
      html,
      body {
        visibility: hidden;
      }
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin: 0;
        text-align: center;
        min-height: 100vh;
        overflow-y: auto;
      }
      /* Overlay */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      /* Modal box */
      .modal-confirm {
        background: #fff;
        padding: 20px;
        border-radius: 16px;
        min-width: 280px;
        max-width: 90%;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: modalFadeIn 0.2s ease;
      }

      .modal-text {
        font-size: 16px;
        margin-bottom: 20px;
        color: #333;
      }

      /* Actions */
      .modal-actions {
        display: flex;
        gap: 10px;
      }

      .modal-btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .modal-btn-cancel {
        background: #f1f1f1;
        color: #333;
      }

      .modal-btn-ok {
        background: #ff3b30;
        color: #fff;
        font-weight: 500;
      }

      .modal-btn:active {
        transform: scale(0.95);
      }

      /* Animation */
      @keyframes modalFadeIn {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .info {
        font-size: 2.8rem;
        padding: 1px;
        border-radius: 8px;
      }
      .countdown {
        font-size: 6rem;
        border-radius: 8px;
        font-weight: bold;
      }
      .info {
        font-size: 2rem;
      }
      .time {
        margin-top: 5px;
        font-size: 1.2rem;
        font-style: italic;
      }
      .cb {
        background: #3e5c76;
        color: #fff;
        border: none;
        padding: 15px 40px;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 50px;
        margin-top: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        display: inline-block;
        -webkit-user-select: none;
        /* Safari */
        -ms-user-select: none;
        /* IE 10+ */
        user-select: none;
        /* Standard */
      }
      .note {
        padding: 5px;
        margin-top: 5px;
        font-size: 1.2rem;
        font-style: italic;
        width: 60%;
      }

      #themeTab {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 8888;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.06);

        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
        box-sizing: border-box;
        transition: box-shadow 0.4s ease;
      }

      #themeTab button {
        height: 34px;
        min-width: 44px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.96);
        color: #1f2937;
        transition:
          background 0.25s ease,
          color 0.25s ease,
          box-shadow 0.25s ease;
      }

      #themeTab .settings-btn {
        min-width: 78px;
        background: #1f2937;
        color: #ffffff;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        line-height: 1;
      }

      #themeTab .settings-btn:hover {
        background: #111827;
      }

      #themeTab:not(.collapsed) .settings-btn {
        min-width: 34px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      #themeTab button.active {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: #ffffff;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
      }

      #themeTab.collapsed button:not(.settings-btn) {
        display: none;
      }

      @media (max-width: 600px) {
        .info {
          font-size: 1.5rem;
          padding: 15px;
        }
        .note {
          font-size: 1.2rem;
          margin-top: 20px;
        }
        .time {
          font-size: 2rem;
        }
        .countdown {
          font-size: 5.5rem;
          padding-top: 15px;
          padding-left: 15px;
          padding-right: 15px;
        }
      }
      .btn-open {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .btn-open:hover {
        background: #0056b3;
      }
      .modal {
        display: none;
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }
      .modal.show {
        opacity: 1;
        visibility: visible;
      }
      .modal-content {
        background: white;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: left;
        animation: fadeIn 0.3s ease;
        box-sizing: border-box;
        padding: 20px;
      }
      @keyframes fadeIn {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .modal-content h2 {
        margin-top: 0;
        font-size: 20px;
        text-align: center;
      }
      .modal-content label {
        font-weight: bold;
        display: block;
      }
      .modal-content input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        margin-top: 5px;
        margin-bottom: 10px;
      }
      .modal-buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }
      .modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }
      .btn-submit {
        background: #28a745;
        color: white;
        margin-right: 10px;
      }
      .btn-cancel {
        background: #dc3545;
        color: white;
      }
      .btn-submit:hover {
        background: #218838;
      }
      .btn-cancel:hover {
        background: #c82333;
      }

      #delta-control {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
      }
      #delta-text {
        font-size: 18px;
      }
      .btn-increase {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        background: #218838;
        color: white;
      }
      .btn-decrease {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        background: #c82333;
        color: white;
      }

  <body>
    <div id="confirmModal" class="modal-overlay">
      <div class="modal-confirm">
        <p class="modal-text">Bạn có chắc chắn?</p>

        <div class="modal-actions">
          <button
            class="modal-btn modal-btn-cancel"
            onclick="handleConfirm(false)"
          >
            Huỷ
          </button>
          <button class="modal-btn modal-btn-ok" onclick="handleConfirm(true)">
            OK
          </button>
        </div>
      </div>
    </div>
    <div class="info" id="info"></div>
    <div class="countdown" id="countdown">Loading...</div>
    <div class="time" id="time"></div>

    <div id="delta-control">
      <button id="btn-decrease-0.01" class="btn-decrease">-0.01</button>
      <button id="btn-decrease-0.05" class="btn-decrease">-0.05</button>
      <span id="delta-text"></span>
      <button id="btn-increase-0.05" class="btn-increase">+0.05</button>
      <button id="btn-increase-0.01" class="btn-increase">+0.01</button>
    </div>
    <div class="note">
      <button class="cb" id="claimBtn" style="visibility: hidden">COPY</button>
      <button
        class="cb"
        id="claimChangeBtn"
        style="
          padding-left: 10px;
          padding-right: 10px;
          margin-left: 10px;
          visibility: hidden;
        "
      >
        +
      </button>
    </div>
    <div id="modal" class="modal">
      <div class="modal-content">
        <label>Thời gian bắt đầu:</label>
        <input type="number" id="start_seconds" placeholder="Ví dụ nhập 0.7" />

        <label>Thời gian kết thúc:</label>
        <input type="number" id="end_seconds" placeholder="Ví dụ nhập 0.1" />

        <label>Hiển thị màu nền:</label>
        <div
          style="
            display: flex;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 10px;
          "
        >
          <input
            type="color"
            id="hex_background_color"
            placeholder="Mã màu sắc, ví dụ nhập #ff0000"
            value="#ff0000"
            style="
              height: 40px;
              padding: 0px;
              margin-right: 10px;
              margin-top: 0px;
              margin-bottom: 0px;
            "
          />
          <span
            id="openColorPicker"
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              white-space: nowrap;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 5px;
              font-size: 16px;
              height: 35px;
              padding: 0 10px;
            "
            >Chọn màu</span
          >
        </div>

        <div class="modal-buttons">
          <button id="btn-submit" class="btn-submit">Thêm</button>
          <button id="btn-cancel" class="btn-cancel">Đóng</button>
        </div>
      </div>
    </div>

    <div
      id="config-container"
      style="
        margin-top: 20px;
        margin-bottom: 30px;
        padding: 15px;
        max-width: 500px;
        border-radius: 10px;
        border: 2px solid gray;
      "
    >
      <button id="btn-open" class="btn-open">
        Thêm màu sắc theo thời gian
      </button>
      <div id="color-display"></div>
    </div>

    <div id="themeTab">
      <button class="settings-btn">Cài đặt</button>
      <button id="btn-theme-1">T1</button>
      <button id="btn-theme-2">🔥 T2</button>
      <button id="btn-theme-3" class="active">T3</button>
      <button id="btn-theme-4">🚀 T4</button>
    </div>
