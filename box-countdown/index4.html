    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        visibility: hidden;
      }

      body {
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        background: linear-gradient(135deg, #f8fafc, #eef2f7, #e2e8f0);
        color: #1f2937;
        transition: background-color 0.25s ease;
        padding-top: 70px;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        justify-content: center;
        align-items: center;
        z-index: 2147483647;
      }

      /* Modal box */
      .modal-confirm {
        background: #fff;
        padding: 20px;
        border-radius: 16px;
        min-width: 280px;
        max-width: 90%;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: modalFadeIn 0.2s ease;
      }

      .modal-text {
        font-size: 16px;
        margin-bottom: 20px;
        color: #333;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
      }

      .modal-btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .modal-btn-cancel {
        background: #f1f1f1;
        color: #333;
      }

      .modal-btn-ok {
        background: #ff3b30;
        color: #fff;
        font-weight: 500;
      }

      .modal-btn:active {
        transform: scale(0.95);
      }

      @keyframes modalFadeIn {
        from {
          transform: scale(0.9);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      #themeTab {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 8888;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
        box-sizing: border-box;
        transition: box-shadow 0.4s ease;
      }

      #themeTab button {
        height: 34px;
        min-width: 44px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.96);
        color: #1f2937;
        transition: background 0.25s ease, color 0.25s ease,
          box-shadow 0.25s ease;
      }

      #themeTab .settings-btn {
        min-width: 78px;
        background: #1f2937;
        color: #ffffff;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
        line-height: 1;
      }

      #themeTab .settings-btn:hover {
        background: #111827;
      }

      #themeTab:not(.collapsed) .settings-btn {
        min-width: 34px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      #themeTab button.active {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: #ffffff;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
      }

      #themeTab.collapsed button:not(.settings-btn) {
        display: none;
      }

      .info {
        font-size: 1.6rem;
        opacity: 0.9;
        margin-bottom: 6px;
        line-height: 1.7;
      }

      .countdown {
        font-size: 6rem;
        font-weight: 800;
        letter-spacing: 1px;
        margin: 10px 0;
        z-index: 10000;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
      }

      .time {
        font-size: 1.1rem;
        opacity: 0.8;
        line-height: 1.6;
      }

      #delta-control {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0;
      }

      #delta-text {
        min-width: 90px;
        font-size: 1.1rem;
      }

      .btn-increase,
      .btn-decrease {
        padding: 8px 14px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        cursor: pointer;
        color: #fff;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      }

      .btn-increase {
        background: #16a34a;
      }

      .btn-decrease {
        background: #d84a4a;
      }

      .note {
        margin-top: 10px;
      }

      .cb {

        border: none;

        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 999px;

        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .cb:active {
        transform: scale(0.97);
      }

      #config-container {
        margin-top: 25px;
        margin-bottom: 30px;
        padding: 15px;
        max-width: 420px;
        width: 90%;
        border-radius: 14px;
        background: transparent;
        backdrop-filter: blur(8px);
      }

      .btn-open {
        padding: 10px 20px;
        background: linear-gradient(135deg, #475569, #1e293b);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-open:hover {
        background: linear-gradient(135deg, #64748b, #334155);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      }

      .btn-acc-setting {
        position: fixed;
        top: 18px;
        left: 18px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #475569, #1e293b);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-acc-setting:hover {
        background: linear-gradient(135deg, #64748b, #334155);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      }

      #color-display {
        margin-top: 10px;
      }

      .color-box {
        background: rgba(0, 0, 0, 0.05);
        border-radius: 12px;
        margin-top: 10px;
        padding: 0;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        transition: opacity 0.25s ease, visibility 0.25s ease;
      }

      .modal-content {
        background: #ffffff;
        color: #111827;
        border-radius: 14px;
        width: 340px;
        padding: 20px;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
        animation: fadeIn 0.25s ease;
      }

      @keyframes fadeIn {
        from {
          transform: scale(0.92);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-content label {
        display: block;
        font-weight: bold;
        margin-top: 8px;
      }

      .modal-content input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      .modal-buttons button {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-submit {
        background: #16a34a;
        color: #fff;
      }

      .btn-cancel {
        background: #dc2626;
        color: #fff;
      }

      @media (max-width: 600px) {
        .countdown {
          font-size: 5.5rem;
        }

        .info {
          font-size: 1.3rem;
          line-height: 1.7;
        }

        .time {
          font-size: 1rem;
          line-height: 1.6;
        }
      }

      a,
      a:visited,
      a:hover,
      a:active {
        color: inherit;
        text-decoration: none;
      }
      .reward-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2147483647;
        font-family: Arial, sans-serif;
      }

      .reward-card {
        position: relative;
        width: 90%;
        max-width: 420px;
        padding: 35px 25px;
        border-radius: 30px;
        text-align: center;
        overflow: hidden;
        background: linear-gradient(180deg, #ffffff, #f0fdf4);
        box-shadow: 0 25px 60px rgba(34, 197, 94, 0.2),
          0 0 50px rgba(34, 197, 94, 0.15);
        animation: popup 0.4s ease;
      }

      .glow {
        position: absolute;
        width: 320px;
        height: 320px;
        background: radial-gradient(
          circle,
          rgba(34, 197, 94, 0.35),
          transparent 70%
        );
        top: -140px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .badge {
        display: block;
        width: fit-content;
        margin: 0 auto 24px;
        padding: 8px 18px;
        border-radius: 999px;
        background: #dcfce7;
        color: #15803d;
        font-size: 18px;
        font-weight: 700;
        border: 1px solid #bbf7d0;
      }

      .coin {
        animation: float 2s infinite ease-in-out;
        filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.4));
        object-fit: contain;
      }

      .reward-card h1 {
        margin: 10px 0;
        color: #16a34a;
        font-size: 34px;
        font-weight: 900;
      }

      .amount {
        font-size: 48px;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .money {
        margin-top: 18px;
        margin-bottom: 30px;
        font-size: 24px;
        color: #15803d;
        font-weight: 800;
      }

      .reward-card p {
        margin: 20px 0 25px;
        color: #4b5563;
        line-height: 1.6;
        font-size: 15px;
      }

      .reward-card button {
        width: 100%;
        border: none;
        border-radius: 18px;
        padding: 16px;
        cursor: pointer;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        color: #fff;
        font-size: 18px;
        font-weight: 800;
        box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
        transition: all 0.2s ease;
      }

      .reward-card button:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 12px 30px rgba(34, 197, 94, 0.45);
      }

      .reward-card button:active {
        transform: scale(0.98);
      }

      .reward-card.lose {
        background: linear-gradient(180deg, #ffffff, #fff1f2);
        box-shadow: 0 25px 60px rgba(239, 68, 68, 0.2),
          0 0 50px rgba(239, 68, 68, 0.15);
      }

      .reward-card.lose .glow {
        background: radial-gradient(
          circle,
          rgba(239, 68, 68, 0.35),
          transparent 70%
        );
      }

      .reward-card.lose .badge {
        background: #fee2e2;
        color: #dc2626;
        border-color: #fecaca;
      }

      .reward-card.lose .coin {
        filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.4));
      }

      .reward-card.lose h1 {
        color: #dc2626;
      }

      .reward-card.lose .amount {
        background: linear-gradient(180deg, #fb7185, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .reward-card.lose .money {
        color: #dc2626;
      }

      .reward-card.lose button {
        background: linear-gradient(180deg, #fb7185, #dc2626);
        box-shadow: 0 8px 20px rgba(239, 68, 68, 0.35);
      }

      .reward-card.lose button:hover {
        box-shadow: 0 12px 30px rgba(239, 68, 68, 0.45);
      }

      @keyframes popup {
        from {
          opacity: 0;
          transform: scale(0.85) translateY(20px);
        }

        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      .config-id-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2147483647;
        font-family: Arial, sans-serif;
      }

      .config-id-card {
        width: 90%;
        max-width: 500px;
        background: #fff;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: config-id-popup 0.25s ease;
      }

      .config-id-card h2 {
        margin: 0 0 20px;
        text-align: center;
        color: #16a34a;
        font-size: 28px;
      }

      .config-id-input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 18px;
      }

      .config-id-input-row input {
        flex: 1;
        border: 2px solid #e5e7eb;
        border-radius: 14px;
        padding: 12px;
        font-size: 15px;
        outline: none;
      }

      .config-id-input-row input:focus {
        border-color: #22c55e;
      }

      .config-id-input-row button {
        border: none;
        border-radius: 14px;
        padding: 0 12px;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .config-id-list {
        max-height: 280px;
        min-height: 120px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-right: 4px;
      }

      .config-id-list::-webkit-scrollbar {
        width: 6px;
      }

      .config-id-list::-webkit-scrollbar-thumb {
        background: #22c55e;
        border-radius: 999px;
      }

      .config-id-delete-btn {
        width: 27px;
        height: 27px;
        border: none;
        border-radius: 50%;
        background: #fee2e2;
        color: #dc2626;
        font-weight: bold;
        cursor: pointer;
        flex-shrink: 0;
        margin-left: 5px;
      }

      .config-id-delete-btn:hover {
        background: #fecaca;
      }

      .config-id-empty {
        text-align: center;
        color: #9ca3af;
        padding: 30px 0;
      }

      .group-config-btn {
        display: flex;
        margin-top: 15px;
        gap: 10px;
      }

      .config-id-ok-btn {
        flex: 1;

        width: 45%;
        border: none;
        border-radius: 16px;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        padding: 13px 0;
      }
      .reset_coin {
        width: 20px;
        height: 20px;
        margin-right: 3px;
        margin-bottom: 2px;
      }
      .config-id-clear-btn {
        flex: 1;
        border: none;
        border-radius: 16px;
        background: linear-gradient(180deg, #ef4444, #dc2626);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        padding: 13px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .config-id-clear-btn:disabled {
        background: linear-gradient(180deg, #d1d5db, #9ca3af);
        color: #f3f4f6;
        cursor: not-allowed;
        opacity: 0.8;
      }

      @keyframes config-id-popup {
        from {
          opacity: 0;
          transform: scale(0.9);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .config-id-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 8px 8px;
      }

      .config-id-stt {
        flex-shrink: 0;
        min-width: 24px;
        text-align: center;
        font-weight: 700;
        color: #64748b;
      }
      .config-id-text {
        flex: 1;
        min-width: 0;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        text-align: left;
      }
      .config-coins-text {
        flex: 0 0 auto;
        margin-left: auto;
      }
      .item_coin {
        flex: 0 0 auto;
        width: 20px;
        height: 20px;
        margin-left: 4px;
      }
      .coin-wrap {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: auto;
        flex-shrink: 0;
      }

      #loading {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #f8fafc, #eef2f7, #e2e8f0);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #ddd;
        border-top: 5px solid #007bff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <button id="btn-acc-setting" class="btn-acc-setting">Cài acc nhặt</button>

    <div class="info" id="info"></div>
    <div class="countdown" id="countdown"></div>
    <div class="time" id="time"></div>

    <div id="delta-control">
      <button id="btn-decrease-0.01" class="btn-decrease">-0.01</button>
      <button id="btn-decrease-0.05" class="btn-decrease">-0.05</button>
      <span id="delta-text"></span>
      <button id="btn-increase-0.05" class="btn-increase">+0.05</button>
      <button id="btn-increase-0.01" class="btn-increase">+0.01</button>
    </div>
    <div class="note">
      <button class="cb" id="claimBtn" style="visibility: hidden">COPY</button>
      <button
        class="cb"
        id="claimChangeBtn"
        style="
          padding-left: 10px;
          padding-right: 10px;
          margin-left: 10px;
          visibility: hidden;
        "
      >
        +
      </button>
    </div>
    <div id="modal" class="modal" onclick="this.style.display='none'">
      <div class="modal-content" onclick="event.stopPropagation()">
        <label>Thời gian bắt đầu:</label>
        <input type="number" id="start_seconds" placeholder="Ví dụ nhập 0.7" />

        <label>Thời gian kết thúc:</label>
        <input type="number" id="end_seconds" placeholder="Ví dụ nhập 0.1" />

        <label>Hiển thị màu nền:</label>
        <div
          style="
            display: flex;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 10px;
          "
        >
          <input
            type="color"
            id="hex_background_color"
            placeholder="Mã màu sắc, ví dụ nhập #ff0000"
            value="#ff0000"
            style="
              height: 40px;
              padding: 0px;
              margin-right: 10px;
              margin-top: 0px;
              margin-bottom: 0px;
            "
          />
          <span
            id="openColorPicker"
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              white-space: nowrap;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 5px;
              font-size: 16px;
              height: 35px;
              padding: 0 10px;
            "
            >Chọn màu</span
          >
        </div>

        <div class="modal-buttons">
          <button id="btn-submit" class="btn-submit">Thêm</button>
          <button id="btn-cancel" class="btn-cancel">Đóng</button>
        </div>
      </div>
    </div>

    <div
      id="config-container"
      style="
        margin-top: 20px;
        margin-bottom: 30px;
        padding: 15px;
        max-width: 500px;
        border-radius: 10px;
        border: 2px solid rgb(170, 168, 168);
      "
    >
      <button id="btn-open" class="btn-open">Canh theo màu sắc</button>
      <div id="color-display"></div>
    </div>

    <div id="themeTab">
      <button class="settings-btn">Cài đặt</button>
      <button id="btn-theme-1">T1</button>
      <button id="btn-theme-2">🔥 T2</button>
      <button id="btn-theme-3">T3</button>
      <button id="btn-theme-4" class="active">🚀 T4</button>
    </div>

    <div

          }

          }

          }
