      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);

        align-items: center;
        z-index: 2147483647;
      }

      /* Modal box */
      .modal-confirm {
        background: #fff;
        padding: 20px;
        border-radius: 16px;
        min-width: 280px;
        max-width: 90%;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: modalFadeIn 0.2s ease;

      .modal-text {
        font-size: 16px;
        margin-bottom: 20px;
        color: #333;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
      }

      .modal-btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .modal-btn-cancel {
        background: #f1f1f1;
        color: #333;
      }

      .modal-btn-ok {
        background: #ff3b30;
        color: #fff;
        font-weight: 500;
      }

      .modal-btn:active {
        transform: scale(0.95);
      }

      @keyframes modalFadeIn {
        from {
          transform: scale(0.9);

        }
        to {

        }

      #themeTab {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 8888;

        align-items: center;
        gap: 6px;
        padding: 6px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);

      }

      #themeTab button {

        border-radius: 999px;

        cursor: pointer;

      #themeTab .settings-btn {

        line-height: 1;

      #themeTab button.active {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: #ffffff;
        box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
      }

      #themeTab.collapsed button:not(.settings-btn) {
        display: none;
      }

      .info {
        font-size: 1.6rem;

        margin-bottom: 6px;

      #delta-control {

        margin: 18px 0;
      }

      #delta-text {

      }

      }

      .btn-acc-setting {

        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-acc-setting:hover {
        background: linear-gradient(135deg, #64748b, #334155);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      }

      #color-display {

      }

      .color-box {
        background: rgba(0, 0, 0, 0.05);
        border-radius: 12px;
        margin-top: 10px;
        padding: 0;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;

        padding: 20px;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
        animation: fadeIn 0.25s ease;
      }

      @keyframes fadeIn {
        from {
          transform: scale(0.92);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .modal-content label {
        display: block;

      .modal-content input {

      .modal-buttons {

      .modal-buttons button {

      }

      .btn-cancel {

      }
      .reward-modal {

        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2147483647;
        font-family: Arial, sans-serif;
      }

      .reward-card {
        position: relative;
        width: 90%;
        max-width: 420px;
        padding: 35px 25px;
        border-radius: 30px;
        text-align: center;

      }

      .glow {
        position: absolute;
        width: 320px;
        height: 320px;
        background: radial-gradient(
          circle,
          rgba(34, 197, 94, 0.35),
          transparent 70%
        );
        top: -140px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .badge {
        display: block;
        width: fit-content;
        margin: 0 auto 24px;
        padding: 8px 18px;
        border-radius: 999px;
        background: #dcfce7;
        color: #15803d;
        font-size: 18px;
        font-weight: 700;
        border: 1px solid #bbf7d0;
      }

      .coin {
        animation: float 2s infinite ease-in-out;
        filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.4));

      }

      .reward-card h1 {
        margin: 10px 0;
        color: #16a34a;
        font-size: 34px;
        font-weight: 900;
      }

      .amount {

        margin-bottom: 30px;
        font-size: 24px;
        color: #15803d;
        font-weight: 800;
      }

      .reward-card p {
        margin: 20px 0 25px;
        color: #4b5563;
        line-height: 1.6;
        font-size: 15px;
      }

      .reward-card button {
        width: 100%;
        border: none;
        border-radius: 18px;
        padding: 16px;
        cursor: pointer;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        color: #fff;
        font-size: 18px;
        font-weight: 800;
        box-shadow: 0 8px 20px rgba(34, 197, 94, 0.35);
        transition: all 0.2s ease;
      }

      .reward-card button:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 12px 30px rgba(34, 197, 94, 0.45);
      }

      .reward-card button:active {
        transform: scale(0.98);
      }

      .reward-card.lose {
        background: linear-gradient(180deg, #ffffff, #fff1f2);
        box-shadow:
          0 25px 60px rgba(239, 68, 68, 0.2),
          0 0 50px rgba(239, 68, 68, 0.15);
      }

      .reward-card.lose .glow {
        background: radial-gradient(
          circle,
          rgba(239, 68, 68, 0.35),
          transparent 70%
        );
      }

      .reward-card.lose .badge {
        background: #fee2e2;
        color: #dc2626;
        border-color: #fecaca;
      }

      .reward-card.lose .coin {
        filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.4));
      }

      .reward-card.lose h1 {
        color: #dc2626;
      }

      .reward-card.lose .amount {
        background: linear-gradient(180deg, #fb7185, #dc2626);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .reward-card.lose .money {
        color: #dc2626;
      }

      .reward-card.lose button {
        background: linear-gradient(180deg, #fb7185, #dc2626);
        box-shadow: 0 8px 20px rgba(239, 68, 68, 0.35);
      }

      .reward-card.lose button:hover {
        box-shadow: 0 12px 30px rgba(239, 68, 68, 0.45);
      }

      @keyframes popup {
        from {
          opacity: 0;
          transform: scale(0.85) translateY(20px);
        }

        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      .config-id-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2147483647;
        font-family: Arial, sans-serif;
      }

      .config-id-card {
        width: 90%;
        max-width: 500px;
        background: #fff;

        font-size: 28px;
      }

      .config-id-input-row {
        display: flex;

      }

      .config-id-input-row input {
        flex: 1;

        border-radius: 14px;
        padding: 12px;
        font-size: 15px;

      }

      .config-id-input-row input:focus {
        border-color: #22c55e;
      }

      .config-id-input-row button {
        border: none;
        border-radius: 14px;
        padding: 0 12px;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .config-id-list {
        max-height: 280px;
        min-height: 120px;

        border-radius: 999px;
      }

      .config-id-delete-btn {
        width: 27px;

        border: none;
        border-radius: 50%;
        background: #fee2e2;
        color: #dc2626;
        font-weight: bold;
        cursor: pointer;
        flex-shrink: 0;
        margin-left: 5px;
      }

      .config-id-delete-btn:hover {
        background: #fecaca;
      }

      .config-id-empty {
        text-align: center;
        color: #9ca3af;
        padding: 30px 0;
      }

      .group-config-btn {
        display: flex;
        margin-top: 15px;
        gap: 10px;
      }

      .config-id-ok-btn {
        flex: 1;

        width: 45%;
        border: none;
        border-radius: 16px;
        background: linear-gradient(180deg, #4ade80, #16a34a);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        padding: 13px 0;
      }
      .reset_coin {
        width: 20px;
        height: 20px;
        margin-right: 3px;
        margin-bottom: 2px;
      }
      .config-id-clear-btn {
        flex: 1;
        border: none;
        border-radius: 16px;
        background: linear-gradient(180deg, #ef4444, #dc2626);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        padding: 13px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .config-id-clear-btn:disabled {
        background: linear-gradient(180deg, #d1d5db, #9ca3af);
        color: #f3f4f6;
        cursor: not-allowed;
        opacity: 0.8;
      }

      @keyframes config-id-popup {
        from {
          opacity: 0;
          transform: scale(0.9);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .config-id-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
        display: flex;
        align-items: center;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 8px 8px;
      }

      .config-id-stt {
        flex-shrink: 0;
        min-width: 24px;
        text-align: center;
        font-weight: 700;
        color: #64748b;
      }
      .config-id-text {
        flex: 1;
        min-width: 0;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
        text-align: left;
      }
      .config-coins-text {
        flex: 0 0 auto;
        margin-left: auto;
      }
      .item_coin {
        flex: 0 0 auto;
        width: 20px;
        height: 20px;
        margin-left: 4px;
      }
      .coin-wrap {
        display: flex;
        align-items: center;
        gap: 2px;
        margin-left: auto;
        flex-shrink: 0;
      }

      #loading {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #f8fafc, #eef2f7, #e2e8f0);

        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .spinner {
        width: 50px;
        height: 50px;

        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

  <body>
    <button id="btn-acc-setting" class="btn-acc-setting">Cài acc nhặt</button>

    <div class="info" id="info"></div>
    <div class="countdown" id="countdown"></div>
    <div class="time" id="time"></div>

    <div id="delta-control">
      <button id="btn-decrease-0.01" class="btn-decrease">-0.01</button>
      <button id="btn-decrease-0.05" class="btn-decrease">-0.05</button>
      <span id="delta-text"></span>
      <button id="btn-increase-0.05" class="btn-increase">+0.05</button>
      <button id="btn-increase-0.01" class="btn-increase">+0.01</button>
    </div>
    <div class="note">
      <button class="cb" id="claimBtn" style="visibility: hidden">COPY</button>
      <button
        class="cb"
        id="claimChangeBtn"
        style="
          padding-left: 10px;
          padding-right: 10px;
          margin-left: 10px;
          visibility: hidden;
        "
      >
        +
      </button>
    </div>
    <div id="modal" class="modal" onclick="this.style.display = 'none'">
      <div class="modal-content" onclick="event.stopPropagation()">
        <label>Thời gian bắt đầu:</label>
        <input type="number" id="start_seconds" placeholder="Ví dụ nhập 0.7" />

        <label>Thời gian kết thúc:</label>
        <input type="number" id="end_seconds" placeholder="Ví dụ nhập 0.1" />

        <label>Hiển thị màu nền:</label>
        <div
          style="
            display: flex;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 10px;
          "
        >
          <input
            type="color"
            id="hex_background_color"
            placeholder="Mã màu sắc, ví dụ nhập #ff0000"
            value="#ff0000"
            style="
              height: 40px;
              padding: 0px;
              margin-right: 10px;
              margin-top: 0px;
              margin-bottom: 0px;
            "
          />
          <span
            id="openColorPicker"
            style="
              display: inline-flex;
              align-items: center;
              justify-content: center;
              white-space: nowrap;
              background: #007bff;
              color: white;
              border: none;
              border-radius: 5px;
              font-size: 16px;
              height: 35px;
              padding: 0 10px;
            "
            >Chọn màu</span
          >
        </div>

        <div class="modal-buttons">
          <button id="btn-submit" class="btn-submit">Thêm</button>
          <button id="btn-cancel" class="btn-cancel">Đóng</button>
        </div>
      </div>
    </div>

    <div
      id="config-container"
      style="
        margin-top: 20px;
        margin-bottom: 30px;
        padding: 15px;
        max-width: 500px;
        border-radius: 10px;
        border: 2px solid rgb(170, 168, 168);
      "
    >
      <button id="btn-open" class="btn-open">Canh theo màu sắc</button>
      <div id="color-display"></div>
    </div>

    <div id="themeTab">
      <button class="settings-btn">Cài đặt</button>
      <button id="btn-theme-1">T1</button>
      <button id="btn-theme-2">🔥 T2</button>
      <button id="btn-theme-3">T3</button>
      <button id="btn-theme-4" class="active">🚀 T4</button>
