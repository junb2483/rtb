<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canh thời gian mở rương</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .info {
        font-size: 2.8rem;
        padding: 5px;
        border-radius: 8px;
      }
      .countdown {
        font-size: 2.8rem;
        padding: 5px;
        border-radius: 8px;
        font-weight: bold;
      }
      .info {
        font-size: 2rem;
      }
      .time {
        padding: 5px;
        margin-top: 5px;
        font-size: 1.2rem;
        font-style: italic;
      }
      .note {
        padding: 5px;
        margin-top: 5px;
        font-size: 1.2rem;
        font-style: italic;
        width: 60%;
      }
      @media (max-width: 600px) {
        .info {
          font-size: 1.5rem;
          padding: 15px;
        }
        .note {
          font-size: 1.2rem;
          margin-top: 50px;
        }
        .time {
          font-size: 2rem;
        }
        .countdown {
          font-size: 5rem;
          padding-top: 15px;
          padding-left: 15px;
          padding-right: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="info" id="info"></div>
    <div class="countdown" id="countdown">Loading...</div>
    <div class="time" id="time"></div>
    <div class="note">
      <b>Để canh chuẩn:</b><br></br>- Thiết bị cần cài đặt tự động đồng bộ thời gian
      <br></br>- Sử dụng thiết bị cấu hình cao (Ví dụ: iPhone 15)
    </div>

    <script>
      const countdownElement = document.getElementById("countdown");
      const infoElement = document.getElementById("info");
      const timeElement = document.getElementById("time");

      const { end_time, user, room, coins, can_open, is_special } = JSON.parse(
        decodeURIComponent(
          escape(atob(new URLSearchParams(window.location.search).get("r")))
        )
      );

      timeElement.innerHTML = `${new Date(end_time).toLocaleTimeString()}`;

      const endTime = new Date(end_time).getTime();
      function startCountdown() {
        function updateCountdown() {
          const totalSeconds = (endTime - Date.now()) / 1000;

          const showGreen = 0.7<=totalSeconds && totalSeconds<=0.8
          const showRed = 0.3<=totalSeconds && totalSeconds<=0.5

          countdownElement.innerHTML = totalSeconds >= 0 ? totalSeconds.toFixed(1) : 0
              
              
              // +" "+ (showGreen?"🟢":"")+ (showRed?"🔴":"") + (!showGreen && !showRed ? "⚪️":"")

          requestAnimationFrame(updateCountdown);
        }

        infoElement.innerHTML = `<b><a href="https://www.tiktok.com" target="_blank" style="text-decoration: none;">${user}</a></b> - ${coins}/${can_open} ${
          is_special ? `🔥🔥` : ""
        }`;

        updateCountdown();
      }

      if (end_time) {
        startCountdown(end_time);
      } else {
        document.getElementById("countdown").innerHTML =
          "No end_time parameter provided in the URL.";
      }
    </script>
  </body>
</html>
