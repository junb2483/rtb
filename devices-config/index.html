<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duyệt thiết bị</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(to bottom right, #f3f4f6, #ede9fe);
        margin: 0;
        padding: 0 20px 0 20px;
        display: flex;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 500px;
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
      }

      .limit-text {
        text-align: center;
        color: #666;
        font-size: 1.2rem;
        margin: 0;
        padding: 0;
        margin-left: 15px;
      }

      .add-btn {
        display: block;
        background: #2563eb;
        color: white;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        font-size: 1rem;
        margin-left: 10px;
      }

      .add-btn:hover {
        background: #1e40af;
      }

      .search-btn {
        display: block;
        background: #2563eb;
        color: white;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        padding: 12px 17px 8px 17px;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        font-size: 1rem;
        margin-left: 10px;
      }

      .search-btn:hover {
        background: #1e40af;
      }

      /* Item list */
      .item {
        background: white;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        word-break: break-word;
      }

      .item-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .stt {
        background: #2563eb;
        color: white;
        font-weight: bold;
        border-radius: 8px;
        padding: 2px 8px;
        font-size: 1.2rem;
      }

      .desc {
        font-weight: 600;
        font-size: 1.1rem;
        flex: 1;
        color: #111;
      }

      .value {
        color: #374151;
        font-size: 1.1rem;
        word-break: break-all;
        margin-bottom: 8px;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        align-items: center;
      }

      .btn-group .time {
        margin-right: auto;
        color: gray;
        font-size: 1rem;
      }

      .btn {
        border: none;
        border-radius: 8px;
        padding: 6px 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }

      .info-btn {
        background: linear-gradient(135deg, #facc15, #f59e0b);
        color: #3b2f00;
        font-size: 1rem;
      }

      .info-btn:hover {
        background: linear-gradient(135deg, #fbbf24, #d97706);
      }

      .edit-btn {
        background: #2563eb;
        color: white;
        font-size: 1rem;
      }

      .edit-btn:hover {
        background: #1e40af;
      }

      .delete-btn {
        background: #dc2626;
        color: white;
        font-size: 1rem;
      }

      .delete-btn:hover {
        background: #991b1b;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
        padding: 16px;
      }

      .modal {
        background: white;
        border-radius: 16px;
        padding: 20px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.25s ease;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
      }

      .modal h2 {
        text-align: center;
        margin-top: 0;
        font-size: 1.3rem;
      }

      .close-icon {
        position: absolute;
        right: 20px;
        top: 20px;
        font-size: 1.5rem;
        background: none;
        border: none;
        color: #555;
        cursor: pointer;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 1.2rem;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #f59e0b;
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
      }

      .modal-buttons {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .save-btn {
        flex: 1;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
        font-size: 1rem;
      }

      .save-btn:hover {
        background: #1d4ed8;
      }

      .cancel-btn {
        flex: 1;
        background: #9ca3af;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
        font-size: 1rem;
      }

      .cancel-btn:hover {
        background: #6b7280;
      }

      .password-modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .password-modal.show {
        opacity: 1;
        visibility: visible;
      }

      .password-modal-content {
        background: white;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: left;
        animation: fadeIn 0.3s ease;
        box-sizing: border-box;
        padding: 20px;
      }

      .password-modal-content label {
        font-weight: bold;
        display: block;
      }
      .password-modal-content input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 5px;
        box-sizing: border-box;
        margin-top: 5px;
      }

      .password-modal-buttons {
        display: flex;
        margin-top: 12px;
      }
      .password-modal-buttons button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      .btn-password-submit {
        background: #28a745;
        color: white;
      }
      .btn-password-submit:hover {
        background: #218838;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="password-modal" class="password-modal">
      <div class="password-modal-content">
        <label>Nhập mật khẩu: </label>
        <input type="password" id="password" placeholder="Mật khẩu" />
        <div class="password-modal-buttons">
          <button id="btn-password-submit" class="btn-password-submit">
            Xác nhận
          </button>
        </div>
      </div>
    </div>

    <div id="container" class="container" style="visibility: hidden">
      <div
        style="
          display: flex;
          align-items: center; /* Căn giữa theo chiều dọc */
          justify-content: space-between; /* Text bên trái, nút bên phải */
          padding: 10px 0px;
          box-sizing: border-box;
          margin: 10px 0 10px 0;
        "
      >
        <p id="limit-text" class="limit-text"></p>
        <button class="add-btn" id="openModalBtn"></button>
      </div>

      <div
        id="search_container"
        style="
          display: flex;
          align-items: center; /* Căn giữa theo chiều dọc */
          justify-content: space-between; /* Text bên trái, nút bên phải */
          padding: 0px 0px;
          box-sizing: border-box;
          margin: 0 0 10px 0;
        "
      >
        <input
          type="text"
          id="text_search"
          placeholder="Gõ để tìm kiếm"
          onfocus="this.setSelectionRange(this.value.length,this.value.length)"
          style="margin: 0"
          enterkeyhint="search"
        />
        <button class="search-btn" id="search_btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            fill="white"
            viewBox="0 0 24 24"
          >
            <path
              d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
              stroke="white"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
        </button>
      </div>

      <div id="itemList"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <button class="close-icon" id="closeModalBtn">&times;</button>
        <h2 id="modalTitle">Thêm mã thiết bị</h2>
        <input
          type="text"
          id="description"
          placeholder="Ghi chú"
          onfocus="this.setSelectionRange(this.value.length,this.value.length)"
        />
        <input
          type="text"
          id="value"
          placeholder="Mã thiết bị"
          onfocus="this.setSelectionRange(this.value.length,this.value.length)"
        />

        <div class="modal-buttons">
          <button class="cancel-btn" id="cancelBtn">Đóng</button>
          <button class="save-btn" id="saveBtn">Lưu</button>
        </div>
      </div>
    </div>
